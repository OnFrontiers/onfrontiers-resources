// Persona-based display gating: which GovCon sections show per role
function getPersonaGating(personaKey) {
  const p = PERSONA_ROLES[personaKey];
  if (!p) return {};
  const isCI = p.type === "ci";
  const isBD = p.type === "bd";
  // Per-role overrides for BD fields
  const showWins = ["capture_mgr", "proposal_mgr", "proposal_writer", "solution_arch"].includes(personaKey);
  const showDeals = ["capture_mgr", "pricing_expert", "proposal_mgr"].includes(personaKey);
  const showBDSkills = ["capture_mgr", "pricing_expert", "proposal_writer"].includes(personaKey);
  const showBDTools = ["capture_mgr", "proposal_mgr"].includes(personaKey);
  const showVendorExp = ["capture_mgr", "bd_recruiter", "pricing_expert"].includes(personaKey);
  const showCerts = isBD || personaKey === "acquisition_sme";
  const showReviewPanels = isCI;
  return {
    showAgencyProminent: isCI,
    showDomainProminent: isCI || personaKey === "solution_arch" || personaKey === "tech_reviewer",
    showProgramsProminent: isCI,
    showProgramsCollapsed: isBD,
    showClearanceProminent: true,  // always shown
    showCertifications: showCerts,
    showWinHighlights: showWins,
    showDealExperience: showDeals,
    showBDSkills: showBDSkills,
    showBDTools: showBDTools,
    showVendorExperience: showVendorExp,
    showReviewPanels: showReviewPanels,
    isCI,
    isBD,
  };
}

// Thresholds — the minimums before social proof becomes visible
const THRESHOLDS = {
  consultationsToShow: 5,    // Don't display count below this
  reviewsToShowRating: 3,    // Don't display star average below this
  reviewsToShowSection: 1,   // Need at least 1 review to show "Reviews" section
};

// ─── Display rules engine ───
function getDisplayRules(userType, expertVisibility, matchContext, consultationStatus, rateStrategy, expertData) {
  // Hidden experts never appear (except for admin)
  if (expertVisibility === "hidden" && userType !== "admin") {
    return { visible: false };
  }

  const isAnonymous = expertVisibility === "anonymous";
  const hasMatch = matchContext === "solicitation" || matchContext === "expert_request";
  const isBrowse = matchContext === "browse";
  const isKeyword = matchContext === "keyword";
  const isVisitor = userType === "visitor";
  const isFree = userType === "free";
  const isPro = userType === "pro";
  const isCredits = userType === "credits";
  const isAdmin = userType === "admin";
  const isPaid = isPro || isCredits || isAdmin;
  const hasConsulted = consultationStatus === "post";

  // Post-consultation only meaningful for paid users
  // Once consulted, anonymous veil lifts for THIS viewer
  const identityRevealed = hasConsulted && isPaid;

  // Expert maturity — threshold-based social proof gating
  const ed = expertData || EXPERT;
  const meetsConsultationThreshold = ed.consultations >= THRESHOLDS.consultationsToShow;
  const meetsRatingThreshold = ed.reviewCount >= THRESHOLDS.reviewsToShowRating;
  const hasAnyReviews = ed.reviewCount >= THRESHOLDS.reviewsToShowSection;
  const hasTestimonials = ed.testimonials && ed.testimonials.length > 0;
  const isNewExpert = ed.consultations === 0;

  return {
    visible: true,

    // Card rules
    card: {
      showPhoto: !isAnonymous || identityRevealed,
      showName: (!isAnonymous && !isVisitor) || identityRevealed,
      headline: hasMatch ? "match" : "profile",
      showTags: true,
      tagsStyle: isVisitor ? "dimmed" : "full",
      firstBulletVisible: hasMatch,
      restBulletsVisible: hasMatch && (isPaid || isFree),
      allBulletsBlurred: hasMatch && isVisitor,
      showAlignment: hasMatch,
      showRelevanceSnippet: isKeyword,
      showMatchPrompt: isBrowse && !isVisitor,
      showRating: !isVisitor && meetsRatingThreshold,
      showConsultationCount: !isVisitor && meetsConsultationThreshold,
      showNewBadge: !isVisitor && isNewExpert,
      showLocation: isPaid && (!isAnonymous || identityRevealed),
      showAvailability: !isVisitor && isPaid,
      showAvailabilitySlots: !isVisitor && isPaid && ed.calendarConnected,
      showConsultationBadge: identityRevealed,
      cta: identityRevealed
        ? (ed.calendarConnected ? "Book Again" : "Schedule Again")
        : isVisitor
          ? "Sign Up to Connect"
          : isPaid && ed.calendarConnected
            ? "Book Consultation"
            : isFree ? "Request Consultation" : "Request Consultation",
      ctaStyle: identityRevealed ? "filled" : isVisitor ? "outlined" : isFree ? "outlined" : "filled",
      ctaPricingHint: isFree && !identityRevealed ? "Pro plan required" : null,
    },

    // Profile rules
    profile: {
      accessible: !isVisitor,
      showPhoto: !isAnonymous || identityRevealed,
      showFullName: (!isAnonymous && isPaid) || identityRevealed,
      showFirstName: !isAnonymous && isFree && !identityRevealed,
      showBio: true,
      bioBlurred: false,
      showExperience: true,
      experienceBlurred: (isVisitor || isFree) && !identityRevealed,
      showConsultationCount: !isVisitor && meetsConsultationThreshold,
      showRating: !isVisitor && meetsRatingThreshold,
      showNewBadge: !isVisitor && isNewExpert,
      showReviews: (isPaid || identityRevealed) && hasAnyReviews,
      showLocation: isPaid && (!isAnonymous || identityRevealed),
      showAvailability: isPaid,
      showAvailabilityPicker: isPaid && ed.calendarConnected,
      showAvailabilityFallback: isPaid && !ed.calendarConnected,
      showRate: rateStrategy === "profile" ? !isVisitor : isPaid,
      showResponseTime: isPaid,
      showEducation: isPaid,
      headline: hasMatch ? "match" : "profile",
      showMatchSection: hasMatch,
      matchFirstBulletVisible: hasMatch,
      matchRestBulletsVisible: hasMatch && (isPaid || isFree),
      matchBulletsBlurred: hasMatch && isVisitor,
      showConsultationHistory: identityRevealed,
      showTestimonials: !isVisitor,
      testimonialLimit: isPaid || identityRevealed ? 3 : 1,  // Free sees 1, paid sees all
      showContextBar: hasMatch && !isVisitor,
      showShortlistAction: hasMatch && !isVisitor,
      ctaLabel: identityRevealed
        ? (ed.calendarConnected ? "Book Again" : "Schedule Again")
        : isFree ? "Request Consultation"
        : isPaid ? (ed.calendarConnected ? "Book Consultation" : "Request Consultation")
        : null,
      ctaPricingHint: isFree && !identityRevealed ? "Pro plan required" : null,

      // Profile export / download (Credits/Admin viewers)
      showExportButton: isCredits || isAdmin,

      // GovCon data gating by viewer tier
      // Tier 1 identity (persona, role type, years, years since left) — all logged-in users
      govconTier1: !isVisitor,
      // Tier 2 summary (agency/domain names visible, no year counts or breakdowns) — Pro+
      govconTier2Summary: isPro || isCredits || isAdmin,
      // Tier 2 full (year counts, breakdowns, programs, certs) — Credits/Admin
      govconTier2Full: isCredits || isAdmin,
      // Clearances — Credits/Admin
      govconClearances: isCredits || isAdmin,
      // BD Depth section — Credits/Admin
      govconBDDepth: isCredits || isAdmin,
      // Services: names+categories visible Pro+, full detail Credits/Admin
      servicesVisible: isPro || isCredits || isAdmin,
      servicesFull: isCredits || isAdmin,
      // Blurred overlay for Free users seeing GovCon sections
      govconBlurred: isFree && !isAdmin,

      // Self-vetting (only in match context — solicitation or expert_request)
      showVettingBadge: hasMatch && !isVisitor,                    // "Verified Fit" badge — all logged-in
      showVettingAnswersSummary: hasMatch && isPro && !isCredits && !isAdmin,  // yes/no only for Pro
      showVettingAnswers: hasMatch && (isCredits || isAdmin),      // full Q&A for Credits/Admin
      showExpertNote: hasMatch && (isCredits || isAdmin),          // expert's own words
      showComplianceStatus: hasMatch && isAdmin,                   // compliance — admin only
      showExclusivitySignal: hasMatch && (isCredits || isAdmin),   // "No conflicts" / "In discussions"
      showRestrictedExperts: isAdmin,                              // admin can see restricted experts
      vettingBlurred: hasMatch && isFree,                          // Free: blurred vetting section
    },
  };
}

const Silhouette = ({ size = 56 }) => (
  <div style={{ width: size, height: size, borderRadius: "50%", background: GRAY_100, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, border: `2px dashed ${GRAY_300}` }}>

  <span style={{

const AlignmentBar = ({ score }) => (
  <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
    <div style={{ width: 48, height: 5, borderRadius: 3, background: GRAY_100, overflow: "hidden" }}>

const StarRating = ({ rating, count }) => (

    {count && <span style={{ fontSize: 11, color: GRAY_400 }}>({count})</span>}

          <svg width="11" height="11" viewBox="0 0 20 20" fill={TEAL}><path fillRule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clipRule="evenodd" /></svg>
          {message}

const LockIcon = () => (
  <svg width="11" height="11" viewBox="0 0 20 20" fill={TEAL} style={{ flexShrink: 0 }}>
    <path fillRule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clipRule="evenodd" />

// ─── EDUCATION (Option F — primary + expandable) ───
function EducationExpandable({ education }) {
  const [expanded, setExpanded] = useState(false);
  const primary = education[0];
  const rest = education.slice(1);
  const abbrev = (cred) => cred.replace("Bachelor of Science", "B.S.").replace("Master of Science", "M.S.").replace("Certificate", "Cert.");

  return (
    <div>
      <span style={{ color: GRAY_700, fontWeight: 500 }}>
        {abbrev(primary.credential)}, {primary.field}, {primary.institution}
      </span>
      {rest.length > 0 && !expanded && (
        <button
          onClick={() => setExpanded(true)}
          style={{ marginLeft: 6, fontSize: 10, color: TEAL, fontWeight: 600, background: "none", border: "none", cursor: "pointer", padding: 0 }}
        >
          +{rest.length} more
        </button>
      )}
      {rest.length > 0 && expanded && (
        <button
          onClick={() => setExpanded(false)}
          style={{ marginLeft: 6, fontSize: 10, color: TEAL, fontWeight: 600, background: "none", border: "none", cursor: "pointer", padding: 0 }}
        >
          show less
        </button>
      )}
      {expanded && rest.map((ed, i) => (
        <div key={i} style={{ fontSize: 11, color: GRAY_500, marginTop: 3 }}>
          {abbrev(ed.credential)}, {ed.field}, {ed.institution}
        </div>
      ))}
    </div>
  );
}

// ─── CALENDAR ICON ───

  </svg>
);

const ClockIcon = ({ size = 12, color = GRAY_400 }) => (
  <svg width={size} height={size} viewBox="0 0 20 20" fill={color}>
    <path fillRule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm1-12a1 1 0 10-2 0v4a1 1 0 00.293.707l2.828 2.829a1 1 0 101.415-1.415L11 9.586V6z" clipRule="evenodd" />

// ─── AVAILABILITY SLOT PICKER (profile) ───
function AvailabilitySlotPicker({ expert, onBook }) {
  const [selectedDay, setSelectedDay] = useState(0);
  const [selectedSlot, setSelectedSlot] = useState(null);
  const [duration, setDuration] = useState(60);
  const days = expert.availableSlots || [];
  const currentDay = days[selectedDay];

  return (
    <div>
      {/* Duration selector */}
      <div style={{ display: "flex", gap: 6, marginBottom: 12 }}>
        <span style={{ fontSize: 11, color: GRAY_500, fontWeight: 500, display: "flex", alignItems: "center", marginRight: 4 }}>Duration:</span>
        {[30, 60, 90].map(d => (
          <button
            key={d}
            onClick={() => { setDuration(d); setSelectedSlot(null); }}
            style={{
              padding: "4px 12px", borderRadius: 6, fontSize: 11, fontWeight: 600, cursor: "pointer",
              border: `1.5px solid ${duration === d ? TEAL : GRAY_200}`,
              background: duration === d ? `${TEAL}08` : "white",
              color: duration === d ? TEAL : GRAY_500,
            }}
          >
            {d} min
          </button>
        ))}
      </div>

      {/* Day tabs */}
      <div style={{ display: "flex", gap: 4, marginBottom: 10, overflowX: "auto" }}>
        {days.map((day, i) => (
          <button
            key={i}
            onClick={() => { setSelectedDay(i); setSelectedSlot(null); }}
            style={{
              padding: "6px 12px", borderRadius: 8, fontSize: 11, fontWeight: 600, cursor: "pointer",
              whiteSpace: "nowrap", transition: "all .12s",
              border: `1.5px solid ${selectedDay === i ? TEAL : GRAY_200}`,
              background: selectedDay === i ? `${TEAL}10` : "white",
              color: selectedDay === i ? TEAL : GRAY_600,
            }}
          >
            {day.date}
            <span style={{ display: "block", fontSize: 10, fontWeight: 400, color: selectedDay === i ? `${TEAL}99` : GRAY_400, marginTop: 1 }}>
              {day.slots.length} slot{day.slots.length !== 1 ? "s" : ""}
            </span>
          </button>
        ))}
      </div>

      {/* Time slots grid */}
      {currentDay && (
        <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
          {currentDay.slots.map((slot, i) => {
            const isSelected = selectedSlot === `${selectedDay}-${i}`;
            return (
              <button
                key={i}
                onClick={() => setSelectedSlot(isSelected ? null : `${selectedDay}-${i}`)}
                style={{
                  padding: "8px 14px", borderRadius: 8, cursor: "pointer", transition: "all .12s",
                  border: `2px solid ${isSelected ? TEAL : GRAY_200}`,
                  background: isSelected ? TEAL : "white",
                  color: isSelected ? "white" : GRAY_700,
                  fontSize: 13, fontWeight: 600,
                  boxShadow: isSelected ? `0 2px 8px ${TEAL}30` : "none",
                }}
              >
                {slot.time}
              </button>
            );
          })}
        </div>
      )}

      {/* Selected slot confirmation */}
      {selectedSlot && currentDay && (
        <div style={{
          marginTop: 12, padding: "12px 14px", background: `${TEAL}06`, borderRadius: 10,
          border: `1px solid ${TEAL}20`, display: "flex", alignItems: "center", justifyContent: "space-between",
        }}>
          <div>
            <div style={{ fontSize: 13, fontWeight: 600, color: GRAY_800 }}>
              {currentDay.date} at {currentDay.slots[parseInt(selectedSlot.split("-")[1])].time}
            </div>
            <div style={{ fontSize: 11, color: GRAY_500, marginTop: 2 }}>
              {duration} min · {expert.timezone} · {expert.hourlyRate}
            </div>
          </div>
          <button
            onClick={onBook}
            style={{
              background: TEAL, color: "white", border: "none", borderRadius: 8,
              padding: "8px 20px", fontSize: 13, fontWeight: 700, cursor: "pointer",
              boxShadow: `0 2px 8px ${TEAL}30`,
            }}
          >
            Book Now
          </button>
        </div>
      )}

      {/* Timezone notice */}
      <div style={{ marginTop: 10, display: "flex", alignItems: "center", gap: 5, fontSize: 10, color: GRAY_400 }}>
        <ClockIcon size={10} color={GRAY_300} />
        Times shown in {expert.timezone} · {expert.bufferMinutes}min buffer between sessions · {expert.minNoticeHours}hr minimum notice
      </div>
    </div>
  );
}

// ─── AVAILABILITY CARD BADGE (compact for card view) ───
function AvailabilityCardBadge({ expert }) {
  if (!expert.calendarConnected) {
    return (
      <div style={{ marginTop: 6, fontSize: 11, color: GREEN, fontWeight: 500 }}>● {expert.availability}</div>
    );
  }

  // Connected: show next available slot count
  const totalSlots = (expert.availableSlots || []).reduce((sum, d) => sum + d.slots.length, 0);
  const nextDay = expert.availableSlots?.[0];
  const nextSlot = nextDay?.slots?.[0];

  return (
    <div style={{ marginTop: 6, display: "flex", alignItems: "center", gap: 8 }}>
      <div style={{ display: "flex", alignItems: "center", gap: 4, fontSize: 11, color: TEAL, fontWeight: 600 }}>
        <CalendarIcon size={12} color={TEAL} />
        {totalSlots} slots this week
      </div>
      {nextSlot && (
        <span style={{ fontSize: 10, color: GRAY_400 }}>
          Next: {nextDay.date} at {nextSlot.time}
        </span>
      )}
    </div>
  );
}

// ─── AVAILABILITY FALLBACK (unconnected expert, profile view) ───
function AvailabilityFallback({ expert }) {
  return (
    <div style={{ padding: "14px 16px", background: GRAY_50, borderRadius: 10, border: `1px solid ${GRAY_200}` }}>
      <div style={{ display: "flex", alignItems: "flex-start", gap: 12 }}>
        <div style={{ width: 36, height: 36, borderRadius: 8, background: `${GREEN}10`, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
          <CalendarIcon size={18} color={GREEN} />
        </div>
        <div style={{ flex: 1 }}>
          <div style={{ fontSize: 13, fontWeight: 600, color: GRAY_700 }}>Request available times</div>
          <div style={{ fontSize: 12, color: GRAY_500, marginTop: 2, lineHeight: 1.4 }}>
            This expert hasn't connected their calendar yet. Submit a consultation request and they'll propose available times.
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 8, marginTop: 8 }}>
            <span style={{ fontSize: 11, color: GREEN, fontWeight: 500 }}>● {expert.availability}</span>
            {expert.responseTime && (
              <>
                <span style={{ color: GRAY_300 }}>·</span>
                <span style={{ fontSize: 11, color: GRAY_500 }}>{expert.responseTime}</span>
              </>
            )}
          </div>
        </div>
      </div>
    </div>

}

// ─── SEARCH RESULT CARD ───
function ExpertCard({ expert, rules, matchContext, persona, personaGating, selfVetting }) {
  const c = rules.card;
  const p = rules.profile;
  const sv = selfVetting || {};
  const matchKey = (matchContext === "solicitation" || matchContext === "expert_request") ? matchContext : null;
  const headline = c.headline === "match" && matchKey ? expert.matchHeadlines[matchKey] : expert.profileHeadline;
  const bullets = matchKey ? expert.matchBullets[matchKey] : [];
  const alignment = matchKey ? expert.alignment[matchKey] : 0;

  return (
    <div style={{ background: "white", borderRadius: 12, border: `1px solid ${GRAY_200}`, padding: "18px 20px" }}>
      <div style={{ display: "flex", gap: 14, alignItems: "flex-start" }}>
        {c.showPhoto ? <Avatar initials={expert.initials} color={expert.photoColor} /> : <Silhouette />}

        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 12 }}>
            <div style={{ flex: 1 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                <h3 style={{ margin: 0, fontSize: 16, fontWeight: 700, color: GRAY_900 }}>
                  {c.showName ? expert.fullName : expert.genericTitle}
                </h3>
                {c.showRating && <StarRating rating={expert.rating} count={expert.reviewCount} />}
                {c.showNewBadge && (
                  <span style={{ fontSize: 10, fontWeight: 600, color: TEAL, background: `${TEAL}12`, padding: "2px 8px", borderRadius: 4, whiteSpace: "nowrap" }}>New on OnFrontiers</span>
                )}
              </div>
              <p style={{ margin: "2px 0 0", fontSize: 13, color: c.headline === "match" ? GRAY_700 : GRAY_500, lineHeight: 1.4, fontWeight: c.headline === "match" ? 500 : 400 }}>
                {headline}
              </p>
            </div>

            <div style={{ display: "flex", flexDirection: "column", alignItems: "flex-end", gap: 3, flexShrink: 0 }}>
              <button style={{
                display: "flex", alignItems: "center", gap: 6,
                background: c.ctaStyle === "filled" ? TEAL : "white",
                border: `1.5px solid ${TEAL}`,
                color: c.ctaStyle === "filled" ? "white" : TEAL,
                borderRadius: 8, padding: "8px 16px",
                fontSize: 13, fontWeight: 600, cursor: "pointer",
                whiteSpace: "nowrap",
              }}>
                {c.cta}
              </button>
              {c.ctaPricingHint && (
                <span style={{ fontSize: 10, color: GRAY_400, fontWeight: 500 }}>{c.ctaPricingHint}</span>
              )}
            </div>
          </div>

          {/* Tags + location row — Cerca-derived when GovCon data present */}
          <div style={{ display: "flex", flexWrap: "wrap", marginTop: 8, alignItems: "center", gap: 4 }}>
            {expert.govcon && rules.profile.govconTier2Summary
              ? expert.govcon.agencyExperience.slice(0, 3).map(a => <Tag key={a.name}>{a.name}</Tag>)
              : !expert.govcon || !rules.profile.govconTier1
                ? expert.tags.map(t => <Tag key={t} dimmed={c.tagsStyle === "dimmed"}>{t}</Tag>)
                : expert.tags.map(t => <Tag key={t} dimmed={c.tagsStyle === "dimmed"}>{t}</Tag>)
            }
            {c.showLocation && expert.location && (
              <span style={{ fontSize: 11, color: GRAY_400, fontWeight: 500, marginLeft: 4, display: "inline-flex", alignItems: "center", gap: 3 }}>
                <svg width="10" height="10" viewBox="0 0 20 20" fill={GRAY_400}><path fillRule="evenodd" d="M5.05 4.05a7 7 0 119.9 9.9L10 18.9l-4.95-4.95a7 7 0 010-9.9zM10 11a2 2 0 100-4 2 2 0 000 4z" clipRule="evenodd" /></svg>
                {expert.location}
              </span>
            )}
          </div>

          {/* GovCon Tier 1 signals — visible to all logged-in users */}
          {expert.govcon && persona && rules.profile.govconTier1 && (
            <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginTop: 8 }}>
              {/* Persona badge */}
              <span style={{
                fontSize: 10, fontWeight: 700, padding: "2px 8px", borderRadius: 4, whiteSpace: "nowrap",
                color: personaGating.isCI ? ORANGE : BLUE,
                background: personaGating.isCI ? `${ORANGE}12` : `${BLUE}12`,
                border: `1px solid ${personaGating.isCI ? `${ORANGE}25` : `${BLUE}25`}`,
              }}>
                {PERSONA_ROLES[persona]?.label}
              </span>
              {/* Current role type */}
              <span style={{ fontSize: 10, fontWeight: 600, color: GRAY_600, background: GRAY_100, padding: "2px 8px", borderRadius: 4, whiteSpace: "nowrap" }}>
                {expert.govcon.currentRoleType}
              </span>
              {/* Years in public sector */}
              <span style={{ fontSize: 10, fontWeight: 500, color: GRAY_500, padding: "2px 8px", borderRadius: 4, background: GRAY_50, whiteSpace: "nowrap" }}>
                {expert.govcon.yearsInPublicSector}yr public sector
              </span>
              {/* Years since left gov */}
              {expert.govcon.yearsSinceLeftGov > 0 && (
                <span style={{ fontSize: 10, fontWeight: 500, color: GRAY_500, padding: "2px 8px", borderRadius: 4, background: GRAY_50, whiteSpace: "nowrap" }}>
                  Left gov {expert.govcon.yearsSinceLeftGov}yr ago
                </span>
              )}
              {/* Clearance — Credits viewers only */}
              {rules.profile.govconClearances && expert.govcon.clearances?.[0] && (
                <span style={{ fontSize: 10, fontWeight: 700, padding: "2px 8px", borderRadius: 4, whiteSpace: "nowrap",
                  color: expert.govcon.clearances[0].type.includes("TS") ? "#B45309" : GRAY_600,
                  background: expert.govcon.clearances[0].type.includes("TS") ? "#FEF3C7" : GRAY_100,
                }}>
                  {expert.govcon.clearances[0].type} {expert.govcon.clearances[0].status !== "Active" ? `(${expert.govcon.clearances[0].status})` : ""}
                </span>
              )}
            </div>
          )}

          {/* Self-vetting signals (solicitation/expert_request context only) */}
          {p.showVettingBadge && sv.fitStatus && (
            <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginTop: 8, alignItems: "center" }}>
              {/* Verified Fit badge */}
              {sv.fitStatus === "verified" && (
                <span style={{
                  display: "inline-flex", alignItems: "center", gap: 4,
                  fontSize: 10, fontWeight: 700, padding: "3px 10px", borderRadius: 5,
                  color: "#15803D", background: "#F0FDF4", border: "1px solid #BBF7D0",
                }}>
                  <svg width="10" height="10" viewBox="0 0 20 20" fill="#15803D"><path fillRule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clipRule="evenodd" /></svg>
                  Verified Fit
                </span>
              )}
              {sv.fitStatus === "unreviewed" && (
                <span style={{ fontSize: 10, fontWeight: 600, color: GRAY_400, background: GRAY_50, padding: "3px 10px", borderRadius: 5, border: `1px solid ${GRAY_200}` }}>
                  Pending review
                </span>
              )}
              {/* Compliance dot — admin only */}
              {p.showComplianceStatus && sv.complianceStatus && (
                <span style={{
                  display: "inline-flex", alignItems: "center", gap: 4,
                  fontSize: 10, fontWeight: 600, padding: "3px 10px", borderRadius: 5,
                  color: sv.complianceStatus === "unrestricted" ? "#15803D" : sv.complianceStatus === "restricted" ? RED : AMBER,
                  background: sv.complianceStatus === "unrestricted" ? "#F0FDF4" : sv.complianceStatus === "restricted" ? "#FEF2F2" : "#FFFBEB",
                  border: `1px solid ${sv.complianceStatus === "unrestricted" ? "#BBF7D0" : sv.complianceStatus === "restricted" ? "#FECACA" : "#FDE68A"}`,
                }}>
                  <span style={{
                    width: 6, height: 6, borderRadius: "50%",
                    background: sv.complianceStatus === "unrestricted" ? "#15803D" : sv.complianceStatus === "restricted" ? RED : AMBER,
                  }} />
                  {sv.complianceStatus === "unrestricted" ? "Unrestricted" : sv.complianceStatus === "restricted" ? "Restricted" : "Case-by-case"}
                </span>
              )}
              {/* Exclusivity signal — Credits/Admin */}
              {p.showExclusivitySignal && sv.exclusivitySignal && (
                <span style={{
                  fontSize: 10, fontWeight: 500, color: sv.exclusivitySignal === "no_conflicts" ? TEAL : sv.exclusivitySignal === "in_discussions" ? AMBER : RED,
                  display: "inline-flex", alignItems: "center", gap: 4,
                }}>
                  <span style={{
                    width: 5, height: 5, borderRadius: "50%",
                    background: sv.exclusivitySignal === "no_conflicts" ? TEAL : sv.exclusivitySignal === "in_discussions" ? AMBER : RED,
                  }} />
                  {sv.exclusivitySignal === "no_conflicts" ? "No conflicts" : sv.exclusivitySignal === "in_discussions" ? "In discussions with 1 team" : "Engaged by another team"}
                </span>
              )}
            </div>
          )}

          {/* Consultation badge */}
          {c.showConsultationBadge && expert.lastConsultation && (
            <div style={{ marginTop: 6, display: "flex", alignItems: "center", gap: 5, fontSize: 11, fontWeight: 600, color: TEAL }}>
              <svg width="12" height="12" viewBox="0 0 20 20" fill={TEAL}><path fillRule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clipRule="evenodd" /></svg>
              Previous consultation · {expert.lastConsultation}
            </div>
          )}

          {/* Consultation count (social proof) */}
          {c.showConsultationCount && !c.showConsultationBadge && (
            <div style={{ marginTop: 6, fontSize: 11, color: GRAY_500, fontWeight: 500 }}>
              {expert.consultations} consultations on OnFrontiers
            </div>
          )}

          {/* Availability */}
          {c.showAvailability && (
            c.showAvailabilitySlots
              ? <AvailabilityCardBadge expert={expert} />
              : <div style={{ marginTop: 6, fontSize: 11, color: GREEN, fontWeight: 500 }}>● {expert.availability}</div>
          )}

          {/* Services indicator — visible Pro+ */}
          {expert.services && expert.services.length > 0 && rules.profile.servicesVisible && (
            <div style={{ marginTop: 6, display: "flex", alignItems: "center", gap: 5, fontSize: 11, color: GRAY_500, fontWeight: 500 }}>
              <svg width="11" height="11" viewBox="0 0 20 20" fill={GRAY_400}>
                <path fillRule="evenodd" d="M6 2a2 2 0 00-2 2v12a2 2 0 002 2h8a2 2 0 002-2V7.414A2 2 0 0015.414 6L12 2.586A2 2 0 0010.586 2H6zm5 6a1 1 0 10-2 0v2H7a1 1 0 100 2h2v2a1 1 0 102 0v-2h2a1 1 0 100-2h-2V8z" clipRule="evenodd" />
              </svg>
              Offers {expert.services.length} services
            </div>
          )}

          {/* Match bullets */}
          {matchKey && c.firstBulletVisible && (
            <div style={{ marginTop: 10 }}>
              <div style={{ fontSize: 13, color: GRAY_700, lineHeight: 1.6, display: "flex", gap: 8 }}>
                <span style={{ color: TEAL, flexShrink: 0, fontWeight: 700 }}>•</span>
                <span>{bullets[0]}</span>
              </div>
              {c.restBulletsVisible ? (
                // Pro/Credits: show all bullets
                bullets.slice(1).map((b, i) => (
                  <div key={i} style={{ fontSize: 13, color: GRAY_700, lineHeight: 1.6, display: "flex", gap: 8, marginTop: 3 }}>
                    <span style={{ color: TEAL, flexShrink: 0, fontWeight: 700 }}>•</span>
                    <span>{b}</span>
                  </div>
                ))
              ) : (
                // Visitor/Free: blur the rest
                <div style={{ position: "relative", marginTop: 4 }}>
                  <div style={{ fontSize: 13, color: GRAY_700, lineHeight: 1.6, opacity: 0.18, filter: "blur(3px)", userSelect: "none" }}>
                    {bullets.slice(1).map((b, i) => (
                      <div key={i} style={{ display: "flex", gap: 8, marginBottom: 3 }}>
                        <span style={{ flexShrink: 0 }}>•</span><span>{b}</span>
                      </div>
                    ))}
                  </div>
                  <div style={{ position: "absolute", bottom: 0, left: 0, right: 0, height: 32, background: "linear-gradient(transparent, white)" }} />
                </div>
              )}
              {c.allBulletsBlurred && (
                <div style={{ display: "flex", alignItems: "center", gap: 5, marginTop: 4, fontSize: 12, color: TEAL, fontWeight: 500, cursor: "pointer" }}>
                  <LockIcon />
                  {rules.card.cta === "Sign Up to Connect" ? "Create a free account to see full match details" : "Upgrade to see full match details"}
                </div>
              )}
            </div>
          )}

          {/* Keyword search — relevance snippet */}
          {c.showRelevanceSnippet && (
            <div style={{ marginTop: 10, padding: "10px 12px", background: `${BLUE}06`, borderRadius: 8, border: `1px solid ${BLUE}15` }}>
              <div style={{ fontSize: 10, fontWeight: 700, color: BLUE, textTransform: "uppercase", letterSpacing: ".5px", marginBottom: 5 }}>
                Matching "{expert.keywordSnippet.query}" · {expert.keywordSnippet.source}
              </div>
              <div style={{ fontSize: 13, color: GRAY_600, lineHeight: 1.5 }}>
                "…{expert.keywordSnippet.fragments.map((f, i) => (
                  <span key={i} style={f.highlight ? { background: `${BLUE}18`, color: GRAY_900, fontWeight: 600, padding: "1px 2px", borderRadius: 2 } : {}}>
                    {f.text}
                  </span>
                ))}…"
              </div>
              <div style={{ marginTop: 8, display: "flex", alignItems: "center", gap: 5, fontSize: 11, color: TEAL, fontWeight: 500, cursor: "pointer" }}>
                <svg width="12" height="12" viewBox="0 0 20 20" fill={TEAL}><path fillRule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm1-11a1 1 0 10-2 0v3.586L7.707 9.293a1 1 0 00-1.414 1.414l3 3a1 1 0 001.414 0l3-3a1 1 0 00-1.414-1.414L11 10.586V7z" clipRule="evenodd" /></svg>
                Search by solicitation or requirement for full match analysis
              </div>
            </div>
          )}

          {/* Browse mode — match intelligence prompt */}
          {c.showMatchPrompt && (
            <div style={{ marginTop: 10, padding: "12px 14px", background: GRAY_50, borderRadius: 8, border: `1px dashed ${GRAY_300}` }}>
              <div style={{ display: "flex", gap: 10, alignItems: "flex-start" }}>
                <div style={{ width: 32, height: 32, borderRadius: 8, background: `${TEAL}08`, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                  <svg width="16" height="16" viewBox="0 0 20 20" fill={TEAL}>
                    <path fillRule="evenodd" d="M3 3a1 1 0 000 2v8a2 2 0 002 2h2.586l-1.293 1.293a1 1 0 101.414 1.414L10 15.414l2.293 2.293a1 1 0 001.414-1.414L12.414 15H15a2 2 0 002-2V5a1 1 0 100-2H3zm11.707 4.707a1 1 0 00-1.414-1.414L10 9.586 8.707 8.293a1 1 0 00-1.414 0l-2 2a1 1 0 101.414 1.414L8 10.414l1.293 1.293a1 1 0 001.414 0l4-4z" clipRule="evenodd" />
                  </svg>
                </div>
                <div>
                  <div style={{ fontSize: 12, fontWeight: 600, color: GRAY_700, marginBottom: 3 }}>See how this expert matches your opportunity</div>
                  <div style={{ fontSize: 11, color: GRAY_400, lineHeight: 1.4 }}>Search by solicitation, NAICS code, or expert request to see alignment score and detailed match reasons.</div>
                  <button style={{
                    marginTop: 8, display: "inline-flex", alignItems: "center", gap: 5,
                    background: "white", border: `1.5px solid ${TEAL}40`, borderRadius: 6,
                    padding: "5px 12px", fontSize: 11, fontWeight: 600, color: TEAL, cursor: "pointer",
                  }}>
                    <svg width="12" height="12" viewBox="0 0 20 20" fill={TEAL}><path fillRule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clipRule="evenodd" /></svg>
                    Match to opportunity
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* No match, no special mode — minimal prompt */}
          {!matchKey && !c.showRelevanceSnippet && !c.showMatchPrompt && (
            <div style={{ marginTop: 6 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 5, fontSize: 12, color: TEAL, fontWeight: 500, cursor: "pointer" }}>
                <LockIcon />
                {rules.card.cta === "Sign Up to Connect" ? "Create a free account to view full profile" : "View full profile"}
              </div>
            </div>
          )}

          {/* Alignment */}
          {c.showAlignment && <div style={{ marginTop: 8 }}><AlignmentBar score={alignment} /></div>}
        </div>
      </div>
    </div>
  );
}

// ─── CONTEXT BAR (profile navigation + shortlist) ───
function ContextBar({ matchContext, isShortlisted, shortlistCount, onToggleShortlist }) {
  const isSolicitation = matchContext === "solicitation";
  const contextLabel = isSolicitation ? "AFRL MAC IDIQ results" : "R&D Portfolio Strategy results";
  const accentColor = isSolicitation ? TEAL : PURPLE;
  const totalExperts = 8;
  const currentPosition = 2;

  return (
    <div style={{
      display: "flex", alignItems: "center", justifyContent: "space-between",
      padding: "8px 14px", background: "white", borderRadius: 10,
      border: `1px solid ${GRAY_200}`, marginBottom: 10, gap: 10,
    }}>
      {/* Left: back link + context */}
      <div style={{ display: "flex", alignItems: "center", gap: 8, minWidth: 0 }}>
        <button style={{
          display: "flex", alignItems: "center", gap: 5, background: "none",
          border: "none", cursor: "pointer", padding: "4px 0", fontSize: 12,
          fontWeight: 600, color: accentColor, whiteSpace: "nowrap",
        }}>
          <svg width="14" height="14" viewBox="0 0 20 20" fill={accentColor}>
            <path fillRule="evenodd" d="M9.707 16.707a1 1 0 01-1.414 0l-6-6a1 1 0 010-1.414l6-6a1 1 0 011.414 1.414L5.414 9H17a1 1 0 110 2H5.414l4.293 4.293a1 1 0 010 1.414z" clipRule="evenodd" />
          </svg>
          {contextLabel}
        </button>
        <div style={{ width: 1, height: 16, background: GRAY_200, flexShrink: 0 }} />
        <span style={{ fontSize: 11, color: GRAY_400, fontWeight: 500, whiteSpace: "nowrap" }}>
          Expert {currentPosition} of {totalExperts}
        </span>
      </div>

      {/* Center: prev/next */}
      <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
        <button style={{
          display: "flex", alignItems: "center", justifyContent: "center",
          width: 28, height: 28, borderRadius: 6, background: GRAY_50,
          border: `1px solid ${GRAY_200}`, cursor: "pointer",
        }} title="Previous expert">
          <svg width="12" height="12" viewBox="0 0 20 20" fill={GRAY_500}>
            <path fillRule="evenodd" d="M12.707 5.293a1 1 0 010 1.414L9.414 10l3.293 3.293a1 1 0 01-1.414 1.414l-4-4a1 1 0 010-1.414l4-4a1 1 0 011.414 0z" clipRule="evenodd" />
          </svg>
        </button>
        <button style={{
          display: "flex", alignItems: "center", justifyContent: "center",
          width: 28, height: 28, borderRadius: 6, background: GRAY_50,
          border: `1px solid ${GRAY_200}`, cursor: "pointer",
        }} title="Next expert">
          <svg width="12" height="12" viewBox="0 0 20 20" fill={GRAY_500}>
            <path fillRule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clipRule="evenodd" />
          </svg>
        </button>
      </div>

      {/* Right: shortlist action */}
      <button
        onClick={onToggleShortlist}
        style={{
          display: "flex", alignItems: "center", gap: 6, padding: "5px 12px",
          borderRadius: 7, cursor: "pointer", transition: "all .15s", whiteSpace: "nowrap",
          background: isShortlisted ? `${AMBER}12` : "white",
          border: `1.5px solid ${isShortlisted ? AMBER : GRAY_300}`,
          color: isShortlisted ? AMBER : GRAY_600,
          fontSize: 12, fontWeight: 600,
        }}
      >
        <span style={{ fontSize: 14 }}>{isShortlisted ? "★" : "☆"}</span>
        {isShortlisted ? `Saved` : "Save to shortlist"}
        {shortlistCount > 0 && (
          <span style={{
            display: "inline-flex", alignItems: "center", justifyContent: "center",
            minWidth: 18, height: 18, borderRadius: 9, fontSize: 10, fontWeight: 700,
            background: isShortlisted ? AMBER : GRAY_200,
            color: isShortlisted ? "white" : GRAY_600,
            padding: "0 5px",
          }}>
            {shortlistCount}
          </span>
        )}
      </button>
    </div>
  );
}

// ─── PROFILE PAGE ───
// ─── PROFILE EXPORT BUTTON (Credits viewers only) ───
function ProfileExportButton({ show }) {
  if (!show) return null;
  return (
    <button style={{
      display: "inline-flex", alignItems: "center", gap: 6,
      background: "white", border: `1.5px solid ${GRAY_200}`, borderRadius: 8,
      padding: "8px 14px", fontSize: 12, fontWeight: 600, color: GRAY_600,
      cursor: "pointer", whiteSpace: "nowrap",
    }}>
      <svg width="14" height="14" viewBox="0 0 20 20" fill={GRAY_500}>
        <path d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm3.293-7.707a1 1 0 011.414 0L9 10.586V3a1 1 0 112 0v7.586l1.293-1.293a1 1 0 111.414 1.414l-3 3a1 1 0 01-1.414 0l-3-3a1 1 0 010-1.414z" />
      </svg>
      Download Profile
    </button>
  );
}

function ProfilePage({ expert, rules, matchContext, persona, personaGating, selfVetting }) {
  const p = rules.profile;
  const g = expert.govcon || {};
  const pg = personaGating || {};
  const sv = selfVetting || {};
  const matchKey = (matchContext === "solicitation" || matchContext === "expert_request") ? matchContext : null;
  const [expandedExp, setExpandedExp] = useState(new Set());

  // Visitor: signup wall
  if (!p.accessible) {
    return (
      <div style={{ background: "white", borderRadius: 12, border: `1px solid ${GRAY_200}`, overflow: "hidden" }}>
        <div style={{ padding: "24px 20px", textAlign: "center" }}>
          {/* Blurred preview header */}
          <div style={{ filter: "blur(6px)", opacity: 0.15, userSelect: "none", marginBottom: 16 }}>
            <div style={{ width: 80, height: 80, borderRadius: "50%", background: expert.photoColor, margin: "0 auto 12px" }} />
            <div style={{ fontSize: 20, fontWeight: 700, color: GRAY_900 }}>Patricia M.</div>
            <div style={{ fontSize: 14, color: GRAY_500 }}>{expert.profileHeadline}</div>
          </div>

          {/* Signup wall overlay */}
          <div style={{ padding: "20px 16px", background: `${TEAL}04`, borderRadius: 10, border: `1px solid ${TEAL}15` }}>
            <div style={{ width: 48, height: 48, borderRadius: "50%", background: `${TEAL}10`, display: "flex", alignItems: "center", justifyContent: "center", margin: "0 auto 12px" }}>
              <svg width="24" height="24" viewBox="0 0 20 20" fill={TEAL}><path fillRule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clipRule="evenodd" /></svg>
            </div>
            <div style={{ fontSize: 16, fontWeight: 700, color: GRAY_900, marginBottom: 4 }}>Create a free account to view this profile</div>
            <div style={{ fontSize: 13, color: GRAY_500, marginBottom: 14, lineHeight: 1.4 }}>See full expert details, ratings, availability, and request consultations.</div>
            <button style={{ background: TEAL, color: "white", border: "none", borderRadius: 8, padding: "10px 28px", fontSize: 14, fontWeight: 700, cursor: "pointer" }}>Create Free Account</button>
            <div style={{ fontSize: 12, color: GRAY_400, marginTop: 8 }}>Already have an account? <span style={{ color: TEAL, fontWeight: 500, cursor: "pointer" }}>Sign in</span></div>
          </div>
        </div>
      </div>
    );
  }

  // Determine name display
  const displayName = p.showFullName ? expert.fullName : p.showFirstName ? expert.firstName : expert.genericTitle;
  const headerHeadline = p.headline === "match" && matchKey ? expert.matchHeadlines[matchKey] : expert.profileHeadline;
  const bullets = matchKey ? expert.matchBullets[matchKey] : [];
  const alignment = matchKey ? expert.alignment[matchKey] : 0;

  return (
    <div style={{ background: "white", borderRadius: 12, border: `1px solid ${GRAY_200}`, overflow: "hidden" }}>
      {/* Profile header */}
      <div style={{ padding: "20px 20px 16px", borderBottom: `1px solid ${GRAY_100}` }}>
        <div style={{ display: "flex", gap: 16, alignItems: "flex-start" }}>
          {p.showPhoto ? <Avatar initials={expert.initials} color={expert.photoColor} size={72} /> : <Silhouette size={72} />}
          <div style={{ flex: 1 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
              <div>
                <h2 style={{ margin: 0, fontSize: 20, fontWeight: 700, color: GRAY_900 }}>{displayName}</h2>
                <p style={{ margin: "3px 0 0", fontSize: 14, color: p.headline === "match" ? GRAY_700 : GRAY_600, lineHeight: 1.4, fontWeight: p.headline === "match" ? 500 : 400 }}>{headerHeadline}</p>
              </div>
              {p.ctaLabel && (
                <div style={{ display: "flex", flexDirection: "column", alignItems: "flex-end", gap: 3, flexShrink: 0 }}>
                  <button style={{
                    background: p.ctaLabel === "Request Consultation" ? TEAL : "white",
                    border: `1.5px solid ${TEAL}`,
                    color: p.ctaLabel === "Request Consultation" ? "white" : TEAL,
                    borderRadius: 8, padding: "10px 20px", fontSize: 13, fontWeight: 600, cursor: "pointer", whiteSpace: "nowrap",
                  }}>
                    {p.ctaLabel}
                  </button>
                  {p.ctaPricingHint && (
                    <span style={{ fontSize: 10, color: GRAY_400, fontWeight: 500 }}>{p.ctaPricingHint}</span>
                  )}
                </div>
              )}
            </div>

            {/* Quick stats row */}
            <div style={{ display: "flex", gap: 16, marginTop: 10, flexWrap: "wrap", alignItems: "center" }}>
              {p.showRating && <StarRating rating={expert.rating} count={p.showReviews ? expert.reviewCount : null} />}
              {p.showConsultationCount && (
                <span style={{ fontSize: 12, color: GRAY_500 }}>{expert.consultations} consultations</span>
              )}
              {p.showNewBadge && (
                <span style={{ fontSize: 11, fontWeight: 600, color: TEAL, background: `${TEAL}12`, padding: "3px 10px", borderRadius: 4 }}>New on OnFrontiers</span>
              )}
              {p.showLocation && expert.location && (
                <span style={{ fontSize: 12, color: GRAY_500, display: "inline-flex", alignItems: "center", gap: 4 }}>
                  <svg width="11" height="11" viewBox="0 0 20 20" fill={GRAY_400}><path fillRule="evenodd" d="M5.05 4.05a7 7 0 119.9 9.9L10 18.9l-4.95-4.95a7 7 0 010-9.9zM10 11a2 2 0 100-4 2 2 0 000 4z" clipRule="evenodd" /></svg>
                  {expert.location}
                </span>
              )}
              {p.showAvailability && (
                <span style={{ fontSize: 12, color: GREEN, fontWeight: 500 }}>● {expert.availability}</span>
              )}
              {p.showRate && (
                <span style={{ fontSize: 12, color: GRAY_700, fontWeight: 600 }}>{expert.hourlyRate}</span>
              )}
            </div>

            {/* User tags — only when no GovCon structured data */}
            {!expert.govcon && (
              <div style={{ display: "flex", flexWrap: "wrap", marginTop: 8 }}>
                {expert.tags.map(t => <Tag key={t}>{t}</Tag>)}
              </div>
            )}

            {/* Download button — Credits viewers only */}
            {p.showExportButton && (
              <div style={{ marginTop: 10 }}>
                <ProfileExportButton show={true} />
              </div>
            )}
          </div>
        </div>
      </div>

      {/* ── GovCon Identity (Tier 1 — all logged-in users) ── */}
      {g.primaryRole && persona && p.govconTier1 && (
        <div style={{ padding: "14px 20px", borderBottom: `1px solid ${GRAY_100}`, background: `${pg.isCI ? ORANGE : BLUE}04` }}>
          {/* Row 1: Persona + role type + rank */}
          <div style={{ display: "flex", flexWrap: "wrap", gap: 8, alignItems: "center", marginBottom: 8 }}>
            <span style={{
              fontSize: 11, fontWeight: 700, padding: "3px 10px", borderRadius: 5,
              color: pg.isCI ? ORANGE : BLUE,
              background: pg.isCI ? `${ORANGE}14` : `${BLUE}14`,
              border: `1px solid ${pg.isCI ? `${ORANGE}30` : `${BLUE}30`}`,
            }}>
              {PERSONA_ROLES[persona]?.label}
            </span>
            <span style={{ fontSize: 11, fontWeight: 600, color: GRAY_600, background: GRAY_100, padding: "3px 10px", borderRadius: 5 }}>
              {g.currentRoleType}
            </span>
            {g.mostRecentGovRole && (
              <span style={{ fontSize: 11, color: GRAY_600 }}>
                {g.mostRecentGovRole}, {g.mostRecentGovOrg}
              </span>
            )}
            {g.highestRank && (
              <span style={{ fontSize: 11, fontWeight: 600, color: GRAY_700, background: GRAY_50, padding: "2px 8px", borderRadius: 4 }}>
                {g.highestRank}
              </span>
            )}
          </div>
          {/* Row 2: Key stats */}
          <div style={{ display: "flex", flexWrap: "wrap", gap: 12, alignItems: "center" }}>
            <span style={{ fontSize: 12, color: GRAY_700, fontWeight: 500 }}>
              <strong>{g.yearsInPublicSector}</strong> years in public sector
            </span>
            {g.yearsSinceLeftGov > 0 && (
              <span style={{ fontSize: 12, color: GRAY_500 }}>
                Left government {g.yearsSinceLeftGov} years ago
              </span>
            )}
            {p.govconClearances && g.clearances?.map((cl, i) => (
              <span key={i} style={{
                fontSize: 11, fontWeight: 700, padding: "2px 8px", borderRadius: 4,
                color: cl.type.includes("TS") ? "#92400E" : GRAY_600,
                background: cl.type.includes("TS") ? "#FEF3C7" : GRAY_100,
              }}>
                {cl.type} {cl.status !== "Active" ? `(${cl.status})` : ""}
              </span>
            ))}
            {pg.showReviewPanels && g.satOnReviewPanels && (
              <span style={{ fontSize: 11, color: TEAL, fontWeight: 600 }}>Sat on review panels</span>
            )}
          </div>
        </div>
      )}

      {/* ── GovCon Credentials (Tier 2) ── */}
      {g.primaryRole && persona && p.govconTier1 && (p.govconTier2Summary || p.govconBlurred) && (
        p.govconBlurred ? (
          /* Free users: blurred overlay with upgrade prompt */
          <div style={{ padding: "14px 20px", borderBottom: `1px solid ${GRAY_100}` }}>
            <BlurredBlock height={120} message="Upgrade to Pro to see credentials">
              <div>
                <div style={{ fontSize: 11, fontWeight: 700, color: GRAY_500, textTransform: "uppercase", letterSpacing: ".5px", marginBottom: 6 }}>Agency Experience</div>
                <div style={{ display: "flex", flexWrap: "wrap", gap: 4, marginBottom: 12 }}>
                  {g.agencyExperience?.slice(0, 5).map((a, i) => (
                    <span key={i} style={{ fontSize: 11, fontWeight: 500, padding: "3px 10px", borderRadius: 5, background: `${TEAL}08`, color: TEAL }}>
                      {a.name} {a.years}yr
                    </span>
                  ))}
                </div>
                <div style={{ fontSize: 11, fontWeight: 700, color: GRAY_500, textTransform: "uppercase", letterSpacing: ".5px", marginBottom: 6 }}>Domain Experience</div>
                <div style={{ display: "flex", flexWrap: "wrap", gap: 4 }}>
                  {g.domainExperience?.slice(0, 5).map((d, i) => (
                    <span key={i} style={{ fontSize: 11, fontWeight: 500, padding: "3px 10px", borderRadius: 5, background: `${PURPLE}08`, color: PURPLE }}>
                      {d.name} {d.years}yr
                    </span>
                  ))}
                </div>
              </div>
            </BlurredBlock>
          </div>
        ) : (
          /* Pro (summary — names only, no year counts) or Credits (full detail) */
          <div style={{ padding: "14px 20px", borderBottom: `1px solid ${GRAY_100}` }}>
            {/* Agency experience */}
            {(pg.showAgencyProminent || pg.isBD) && g.agencyExperience && (
              <div style={{ marginBottom: 12 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6 }}>
                  <div style={{ fontSize: 11, fontWeight: 700, color: GRAY_500, textTransform: "uppercase", letterSpacing: ".5px" }}>Agency Experience</div>
                  {p.govconTier2Full && g.agencyBreakdown && (
                    <div style={{ display: "flex", gap: 2, alignItems: "center" }}>
                      {Object.entries(g.agencyBreakdown).map(([cat, pct]) => (
                        <span key={cat} style={{ fontSize: 9, fontWeight: 600, color: GRAY_500, background: GRAY_100, padding: "1px 6px", borderRadius: 3 }}>
                          {cat} {pct}%
                        </span>
                      ))}
                    </div>
                  )}
                </div>
                <div style={{ display: "flex", flexWrap: "wrap", gap: 4 }}>
                  {g.agencyExperience.slice(0, 5).map((a, i) => (
                    <span key={i} style={{
                      fontSize: 11, fontWeight: 500, padding: "3px 10px", borderRadius: 5,
                      background: `${TEAL}08`, color: TEAL, border: `1px solid ${TEAL}18`,
                    }}>
                      {a.name}{p.govconTier2Full && <span style={{ fontWeight: 700 }}> {a.years}yr</span>}
                    </span>
                  ))}
                </div>
              </div>
            )}

            {/* Domain experience */}
            {(pg.showDomainProminent || pg.isBD) && g.domainExperience && (
              <div style={{ marginBottom: 12 }}>
                <div style={{ fontSize: 11, fontWeight: 700, color: GRAY_500, textTransform: "uppercase", letterSpacing: ".5px", marginBottom: 6 }}>Domain Experience</div>
                <div style={{ display: "flex", flexWrap: "wrap", gap: 4 }}>
                  {g.domainExperience.slice(0, 5).map((d, i) => (
                    <span key={i} style={{
                      fontSize: 11, fontWeight: 500, padding: "3px 10px", borderRadius: 5,
                      background: `${PURPLE}08`, color: PURPLE, border: `1px solid ${PURPLE}18`,
                    }}>
                      {d.name}{p.govconTier2Full && <span style={{ fontWeight: 700 }}> {d.years}yr</span>}
                    </span>
                  ))}
                </div>

                  background: active ? `${ORANGE}10` : "white",
                }}>
                  <div style={{ fontSize: 11, fontWeight: 700, color: active ? ORANGE : GRAY_600 }}>{role.short}</div>
                  <div style={{ fontSize: 9, color: GRAY_400, lineHeight: 1.2, marginTop: 1 }}>{role.desc}</div>
                </button>
              );
            })}
            <div style={{ width: 1, background: GRAY_200, margin: "0 6px" }} />
            {/* BD roles */}
            <div style={{ fontSize: 9, fontWeight: 700, color: BLUE, textTransform: "uppercase", letterSpacing: ".5px", display: "flex", alignItems: "center", marginRight: 2 }}>BD</div>
            {Object.entries(PERSONA_ROLES).filter(([,r]) => r.type === "bd").map(([key, role]) => {
              const active = persona === key;
              return (
                <button key={key} onClick={() => setPersona(key)} style={{
                  padding: "5px 10px", borderRadius: 6, cursor: "pointer", textAlign: "left", transition: "all .12s",
                  border: `2px solid ${active ? BLUE : GRAY_200}`,
                  background: active ? `${BLUE}10` : "white",
                }}>
                  <div style={{ fontSize: 11, fontWeight: 700, color: active ? BLUE : GRAY_600 }}>{role.short}</div>
                  <div style={{ fontSize: 9, color: GRAY_400, lineHeight: 1.2, marginTop: 1 }}>{role.desc}</div>
                </button>
              );
            })}
          </div>
        </div>

        {/* Strategy toggles */}
        <div style={{ display: "flex", gap: 16, marginBottom: 20, padding: "12px 16px", background: "white", borderRadius: 10, border: `1px solid ${GRAY_200}` }}>
          <div style={{ fontSize: 11, fontWeight: 700, color: GRAY_500, textTransform: "uppercase", letterSpacing: ".5px", display: "flex", alignItems: "center", marginRight: 4 }}>Strategy toggles</div>
          <div style={{ display: "flex", gap: 4 }}>
            {[
              { value: "profile", label: "Rate on profile", desc: "All logged-in users see rate" },
              { value: "booking-only", label: "Rate in booking only", desc: "Rate hidden until booking modal" },
            ].map(opt => {
              const active = rateStrategy === opt.value;
              return (
                <button key={opt.value} onClick={() => setRateStrategy(opt.value)} style={{
                  padding: "6px 14px", borderRadius: 8, cursor: "pointer", textAlign: "left", transition: "all .12s",
                  border: `2px solid ${active ? TEAL : GRAY_200}`,
                  background: active ? `${TEAL}08` : "white",
                }}>
                  <div style={{ fontSize: 12, fontWeight: 700, color: active ? TEAL : GRAY_600 }}>{opt.label}</div>
                  <div style={{ fontSize: 10, color: GRAY_400, lineHeight: 1.3, marginTop: 1 }}>{opt.desc}</div>
                </button>
              );
            })}
          </div>

          <div style={{ width: 1, background: GRAY_200, margin: "0 8px" }} />

          <div style={{ fontSize: 11, fontWeight: 700, color: GRAY_500, textTransform: "uppercase", letterSpacing: ".5px", display: "flex", alignItems: "center", marginRight: 4 }}>Expert maturity</div>
          <div style={{ display: "flex", gap: 4 }}>
            {Object.entries(MATURITY_PROFILES).map(([key, profile]) => {
              const active = expertMaturity === key;
              const accentColor = key === "new_expert" ? ORANGE : key === "growing" ? AMBER : GREEN;
              return (
                <button key={key} onClick={() => setExpertMaturity(key)} style={{
                  padding: "6px 14px", borderRadius: 8, cursor: "pointer", textAlign: "left", transition: "all .12s",
                  border: `2px solid ${active ? accentColor : GRAY_200}`,
                  background: active ? `${accentColor}10` : "white",
                }}>
                  <div style={{ fontSize: 12, fontWeight: 700, color: active ? accentColor : GRAY_600 }}>{profile.label}</div>
                  <div style={{ fontSize: 10, color: GRAY_400, lineHeight: 1.3, marginTop: 1 }}>{profile.desc}</div>
                </button>
              );
            })}
          </div>

          <div style={{ width: 1, background: GRAY_200, margin: "0 8px" }} />

          <div style={{ fontSize: 11, fontWeight: 700, color: GRAY_500, textTransform: "uppercase", letterSpacing: ".5px", display: "flex", alignItems: "center", marginRight: 4 }}>Calendar</div>
          <div style={{ display: "flex", gap: 4 }}>
            {Object.entries(CALENDAR_PROFILES).map(([key, profile]) => {
              const active = calendarStatus === key;
              const accentColor = key === "not_connected" ? GRAY_500 : TEAL;
              return (
                <button key={key} onClick={() => setCalendarStatus(key)} style={{
                  padding: "6px 14px", borderRadius: 8, cursor: "pointer", textAlign: "left", transition: "all .12s",
                  border: `2px solid ${active ? accentColor : GRAY_200}`,
                  background: active ? `${accentColor}10` : "white",
                }}>
                  <div style={{ fontSize: 12, fontWeight: 700, color: active ? accentColor : GRAY_600 }}>{profile.label}</div>
                  <div style={{ fontSize: 10, color: GRAY_400, lineHeight: 1.3, marginTop: 1 }}>{profile.desc}</div>
                </button>
              );
            })}
          </div>
        </div>

        {/* Hidden expert state */}
        {!rules.visible && (
          <div style={{ display: "flex", gap: 20 }}>
            <div style={{ flex: 1, background: "white", borderRadius: 12, border: `1px dashed ${GRAY_300}` }}>
              <HiddenExpertMessage />
            </div>
            <div style={{ flex: 1, background: "white", borderRadius: 12, border: `1px dashed ${GRAY_300}` }}>
              <HiddenExpertMessage />
            </div>
          </div>
        )}

        {/* Card + Profile side by side */}
        {rules.visible && (
          <div style={{ display: "flex", gap: 20, alignItems: "flex-start" }}>

            {/* Left column: Search result card */}
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ fontSize: 11, fontWeight: 700, color: GRAY_400, textTransform: "uppercase", letterSpacing: ".5px", marginBottom: 8 }}>
                Search result card
              </div>
              <ContextHeader matchContext={matchContext} />
              <ExpertCard expert={effectiveExpert} rules={rules} matchContext={matchContext} persona={persona} personaGating={personaGating} selfVetting={SELF_VETTING} />

              <ActiveRulesPanel rules={rules} userType={userType} expertVisibility={expertVisibility} matchContext={matchContext} consultationStatus={consultationStatus} />
            </div>

            {/* Right column: Profile page */}
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ fontSize: 11, fontWeight: 700, color: GRAY_400, textTransform: "uppercase", letterSpacing: ".5px", marginBottom: 8 }}>
                Profile page {userType === "visitor" && <span style={{ color: RED, fontWeight: 700 }}>(signup wall)</span>}
              </div>
              {rules.profile.showContextBar && (
                <ContextBar
                  matchContext={matchContext}
                  isShortlisted={isCurrentExpertShortlisted}
                  shortlistCount={currentShortlist.size}
                  onToggleShortlist={toggleShortlist}
                />
              )}
              <ProfilePage expert={effectiveExpert} rules={rules} matchContext={matchContext} persona={persona} personaGating={personaGating} selfVetting={SELF_VETTING} />
            </div>
          </div>
        )}

        {/* Current config summary */}
        <div style={{ marginTop: 20, padding: "12px 16px", background: "white", borderRadius: 10, border: `1px solid ${GRAY_200}`, display: "flex", gap: 12, alignItems: "center" }}>
          <div style={{ fontSize: 11, color: GRAY_400, fontWeight: 500 }}>Current config:</div>
          <span style={{ fontSize: 11, fontWeight: 700, color: ORANGE, background: `${ORANGE}10`, padding: "2px 8px", borderRadius: 4 }}>
            {expertVisibility === "visible" ? "Visible expert" : expertVisibility === "anonymous" ? "Anonymous expert" : "Hidden expert"}
          </span>
          <span style={{ fontSize: 11, fontWeight: 700, color: PURPLE, background: `${PURPLE}10`, padding: "2px 8px", borderRadius: 4 }}>
            {matchContext === "solicitation" ? "Solicitation match" : matchContext === "expert_request" ? "Expert request match" : matchContext === "keyword" ? "Keyword search" : "Category browse"}
          </span>
          <span style={{ fontSize: 11, fontWeight: 700, color: BLUE, background: `${BLUE}10`, padding: "2px 8px", borderRadius: 4 }}>
            {userType === "visitor" ? "Visitor" : userType === "free" ? "Free account" : userType === "pro" ? "Pro account" : userType === "admin" ? "OF Admin" : "Credits account"}
          </span>
          <span style={{ fontSize: 11, fontWeight: 700, color: GREEN, background: `${GREEN}10`, padding: "2px 8px", borderRadius: 4 }}>
            {consultationStatus === "pre" ? "Pre-consultation" : "Post-consultation"}
          </span>
          <span style={{ fontSize: 11, fontWeight: 700, color: TEAL, background: `${TEAL}10`, padding: "2px 8px", borderRadius: 4 }}>
            {rateStrategy === "profile" ? "Rate on profile" : "Rate in booking only"}
          </span>
          <span style={{ fontSize: 11, fontWeight: 700, color: expertMaturity === "established" ? GREEN : expertMaturity === "growing" ? AMBER : ORANGE, background: `${expertMaturity === "established" ? GREEN : expertMaturity === "growing" ? AMBER : ORANGE}10`, padding: "2px 8px", borderRadius: 4 }}>
            {maturityProfile.label} expert
          </span>
          <span style={{ fontSize: 11, fontWeight: 700, color: calendarStatus === "not_connected" ? GRAY_500 : TEAL, background: `${calendarStatus === "not_connected" ? GRAY_500 : TEAL}10`, padding: "2px 8px", borderRadius: 4 }}>
            {calendarProfile.label} calendar
          </span>
          <span style={{ fontSize: 11, fontWeight: 700, color: personaGating.isCI ? ORANGE : BLUE, background: `${personaGating.isCI ? ORANGE : BLUE}10`, padding: "2px 8px", borderRadius: 4 }}>
            {PERSONA_ROLES[persona]?.label}
          </span>
          <span style={{ fontSize: 11, color: GRAY_400, marginLeft: "auto" }}>
            {3} vis × {4} ctx × {5} viewer × {2} status × {12} persona × {2} rate × {3} maturity × {3} cal = 25,920 combos
          </span>
        </div>
      </div>
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(ExpertDisplayExplorer));
  </script>
</body>
</html>

// ─── Badge Component ───
const Badge = ({ children, color = C.blue, bg, icon }) => (
  <span style={{ display: "inline-flex", alignItems: "center", gap: 4, padding: "3px 10px", borderRadius: 12, fontSize: 12, fontWeight: 600, color, background: bg || `${color}15`, whiteSpace: "nowrap" }}>
    {icon && <Icon name={icon} size={12} color={color} />}
    {children}
  </span>
);

// ─── Button Component ───
const Button = ({ children, variant = "primary", size = "md", onClick, icon, disabled, style: sx }) => {
  const base = { display: "inline-flex", alignItems: "center", gap: 8, border: "none", cursor: disabled ? "default" : "pointer", fontWeight: 600, borderRadius: 8, transition: "all 0.15s", opacity: disabled ? 0.5 : 1, fontFamily: "inherit" };
  const sizes = { sm: { padding: "6px 12px", fontSize: 13 }, md: { padding: "10px 20px", fontSize: 14 }, lg: { padding: "12px 24px", fontSize: 15 } };
  const variants = {
    primary: { background: C.blue, color: C.white },
    secondary: { background: C.gray100, color: C.gray700, border: `1px solid ${C.gray200}` },
    ghost: { background: "transparent", color: C.blue },
    success: { background: C.green, color: C.white },
    danger: { background: `${C.red}12`, color: C.red, border: `1px solid ${C.red}30` },
  };
  return (
    <button onClick={onClick} disabled={disabled} style={{ ...base, ...sizes[size], ...variants[variant], ...sx }}>
      {icon && <Icon name={icon} size={size === "sm" ? 14 : 16} color={variants[variant].color} />}
      {children}
    </button>
  );
};

// ─── SCREEN: OMNIBOX ───
const OmniboxScreen = ({ onSubmit }) => {
  const [inputValue, setInputValue] = useState("");
  const [inputType, setInputType] = useState(null);
  const [isProcessing, setIsProcessing] = useState(false);
  const [dragOver, setDragOver] = useState(false);

  const detectInputType = (val) => {
    if (val.includes("govtribe.com")) return "govtribe";
    if (val.includes("sam.gov")) return "sam";
    if (val.includes("govwin") || val.includes("iq.govwin")) return "govwin";
    if (val.includes("bgov.com")) return "bgov";
    if (/^N\d{5}/.test(val) || /^\w{2}\d{4}/.test(val)) return "contract";
    if (val.length > 20) return "text";
    return null;
  };

  const handleInput = (e) => {
    const val = e.target.value;
    setInputValue(val);
    setInputType(detectInputType(val));
  };

  const handleSubmit = () => {
    setIsProcessing(true);
    setTimeout(() => onSubmit(), 1800);
  };

  const quickStarts = [
    { label: "Program SME", sub: "Former government program managers" },
    { label: "Technical SME", sub: "Government technologists & engineers" },
    { label: "Capture Manager", sub: "BD & capture professionals" },
    { label: "Agency SME", sub: "Senior federal leaders (SES/GS-15)" },

  const inputTypeLabels = {
    govtribe: { label: "Govtribe Opportunity", color: C.blue },
    sam: { label: "SAM.gov Solicitation", color: C.green },
    govwin: { label: "Govwin IQ Link", color: C.orange },
    bgov: { label: "Bloomberg Government", color: C.purple },
    contract: { label: "Contract Number", color: C.amber },
    text: { label: "Description", color: C.gray500 },
  };

  if (isProcessing) {
    return (
      <div style={{ minHeight: "100vh", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", background: C.gray50 }}>
        <div style={{ width: 48, height: 48, border: `3px solid ${C.gray200}`, borderTopColor: C.blue, borderRadius: "50%", animation: "spin 1s linear infinite" }} />
        <p style={{ marginTop: 24, fontSize: 16, color: C.gray700, fontWeight: 500 }}>Enriching opportunity data...</p>
        <p style={{ fontSize: 13, color: C.gray500, marginTop: 4 }}>Fetching from Govtribe MCP • Extracting attributes • Mapping to expert taxonomy</p>
        <style>{`@keyframes spin { to { transform: rotate(360deg); } }`}</style>
      </div>
    );
  }

  return (
    <div style={{ minHeight: "100vh", background: C.gray50 }}>
      {/* Header */}
      <div style={{ background: C.white, borderBottom: `1px solid ${C.gray200}`, padding: "12px 32px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <span style={{ fontSize: 18, fontWeight: 700, color: C.navy, letterSpacing: 1 }}>ONFRONTIERS</span>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 16 }}>
          <span style={{ fontSize: 13, color: C.gray500 }}>Pro Account</span>
          <div style={{ width: 32, height: 32, borderRadius: "50%", background: C.blue, display: "flex", alignItems: "center", justifyContent: "center" }}>
            <span style={{ color: C.white, fontSize: 13, fontWeight: 600 }}>BC</span>
          </div>
        </div>
      </div>

      {/* Hero */}
      <div style={{ maxWidth: 800, margin: "0 auto", padding: "80px 24px 40px" }}>
        <h1 style={{ fontSize: 32, fontWeight: 700, color: C.navy, margin: 0, textAlign: "center" }}>Find the right expert for your opportunity</h1>
        <p style={{ fontSize: 16, color: C.gray500, textAlign: "center", marginTop: 8 }}>Paste a link, upload a document, or describe what you need</p>

        {/* Omnibox */}
        <div style={{ marginTop: 32, background: C.white, borderRadius: 16, boxShadow: "0 4px 24px rgba(0,0,0,0.08)", border: `2px solid ${dragOver ? C.blue : "transparent"}`, padding: 24, transition: "border-color 0.2s" }}
          onDragOver={(e) => { e.preventDefault(); setDragOver(true); }}
          onDragLeave={() => setDragOver(false)}
          onDrop={(e) => { e.preventDefault(); setDragOver(false); }}>
          <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
            <Icon name="search" size={24} color={C.gray300} />
            <input
              value={inputValue}
              onChange={handleInput}
              placeholder="Paste a Govtribe URL, SAM.gov link, Govwin URL, contract number, or describe your need..."
              style={{ flex: 1, border: "none", outline: "none", fontSize: 16, color: C.gray900, fontFamily: "inherit", background: "transparent" }}
            />
            {inputType && inputTypeLabels[inputType] && (
              <Badge color={inputTypeLabels[inputType].color}>{inputTypeLabels[inputType].label}</Badge>
            )}
          </div>

          {/* Detected input hint */}
          {inputValue && (
            <div style={{ marginTop: 16, paddingTop: 16, borderTop: `1px solid ${C.gray100}`, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <div style={{ display: "flex", gap: 8 }}>

            <div style={{ marginTop: 16, paddingTop: 16, borderTop: `1px solid ${C.gray100}` }}>

                <Button variant="ghost" size="sm" icon="upload">Upload PDF</Button>

            </div>
          )}
        </div>

        {/* Quick starts */}
        {!inputValue && (
          <div style={{ marginTop: 40 }}>
            <p style={{ fontSize: 13, fontWeight: 600, color: C.gray500, textTransform: "uppercase", letterSpacing: 1, marginBottom: 16 }}>Or browse by expert type</p>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
              {quickStarts.map((qs) => (
                <div key={qs.label} onClick={handleSubmit}
                  style={{ background: C.white, border: `1px solid ${C.gray200}`, borderRadius: 12, padding: "16px 20px", cursor: "pointer", transition: "all 0.15s" }}
                  onMouseEnter={(e) => { e.currentTarget.style.borderColor = C.blue; e.currentTarget.style.boxShadow = `0 2px 8px ${C.blue}15`; }}
                  onMouseLeave={(e) => { e.currentTarget.style.borderColor = C.gray200; e.currentTarget.style.boxShadow = "none"; }}>
                  <div style={{ fontSize: 15, fontWeight: 600, color: C.gray900 }}>{qs.label}</div>
                  <div style={{ fontSize: 13, color: C.gray500, marginTop: 2 }}>{qs.sub}</div>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* Accepted sources */}
        {!inputValue && (
          <div style={{ marginTop: 40, textAlign: "center" }}>
            <p style={{ fontSize: 12, color: C.gray500 }}>Works with</p>
            <div style={{ display: "flex", justifyContent: "center", gap: 24, marginTop: 8 }}>
              {["Govtribe", "Govwin IQ", "SAM.gov", "Bloomberg Gov", "Any PDF/Doc"].map(s => (
                <span key={s} style={{ fontSize: 12, color: C.gray500, fontWeight: 500 }}>{s}</span>
              ))}
            </div>
          </div>
        )}
      </div>
    </div>
  );
};

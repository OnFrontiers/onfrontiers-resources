function SignupModal({ onClose, onSignup, onCreateAccount, expertContext, userTier, userInfo }) {
  const [mode, setMode] = useState("signup");
  const [firstName, setFirstName] = useState(userInfo?.firstName || "");
  const [lastName, setLastName] = useState(userInfo?.lastName || "");
  const [email, setEmail] = useState(userInfo?.email || "");
  const [password, setPassword] = useState("");
  const [agreed, setAgreed] = useState(false);
  const [formError, setFormError] = useState("");

  const hasEmail = userTier === "email-captured" && userInfo?.email;
  const [company, setCompany] = useState(userInfo?.company || "");
  const companyWasInferred = !!(userInfo?.company);

  const handleCreateAccount = () => {
    if (!firstName.trim() || !lastName.trim()) { setFormError("First and last name are required"); return; }
    if (!hasEmail && !email.trim()) { setFormError("Email is required"); return; }
    if (password.length < 6) { setFormError("Password must be at least 6 characters"); return; }
    if (!agreed) { setFormError("Please agree to the terms to continue"); return; }
    setFormError("");
    onCreateAccount({ firstName: firstName.trim(), lastName: lastName.trim(), email: hasEmail ? userInfo.email : email.trim(), company: company.trim(), password });
  };

  return (
    <div style={{ position: "fixed", inset: 0, zIndex: 100, display: "flex", alignItems: "center", justifyContent: "center" }}>
      <div onClick={onClose} style={{ position: "absolute", inset: 0, background: "rgba(0,0,0,0.5)", backdropFilter: "blur(4px)" }} />
      <div style={{ position: "relative", background: C.white, borderRadius: 16, width: 440, maxWidth: "90vw", overflow: "hidden", boxShadow: "0 20px 60px rgba(0,0,0,0.3)" }}>
        {/* Expert context header */}
        {expertContext && (
          <div style={{ padding: "14px 24px", background: C.gray50, borderBottom: `1px solid ${C.gray200}`, display: "flex", alignItems: "center", gap: 12 }}>
            {expertContext.anonymous ? (
              <div style={{ width: 36, height: 36, borderRadius: "50%", background: C.gray100, display: "flex", alignItems: "center", justifyContent: "center", border: `2px dashed ${C.gray300}` }}>
                <Icon name="user" size={16} color={C.gray400} />
              </div>
            ) : (
              <div style={{ width: 36, height: 36, borderRadius: "50%", background: `linear-gradient(135deg, ${expertContext.color}, ${expertContext.color}CC)`, display: "flex", alignItems: "center", justifyContent: "center", color: C.white, fontSize: 13, fontWeight: 700 }}>
                {expertContext.initials}
              </div>
            )}
            <div>
              <div style={{ fontSize: 12, color: C.gray500 }}>Viewing</div>
              <div style={{ fontSize: 13, fontWeight: 600, color: C.gray800 }}>{expertContext.genericTitle}</div>
            </div>
            <LockFilled size={16} color={C.gray400} />
          </div>
        )}

        <div style={{ padding: "28px 32px" }}>
          <button onClick={onClose} style={{ position: "absolute", top: expertContext ? 60 : 16, right: 16, background: "none", border: "none", cursor: "pointer", padding: 4 }}>
            <Icon name="x" size={20} color={C.gray400} />
          </button>

          {mode === "signup" ? (
            <>
              <h2 style={{ margin: "0 0 6px", fontSize: 22, fontWeight: 700, color: C.gray900 }}>
                {expertContext ? "Unlock this expert's full profile" : "Create your free account"}
              </h2>
              <p style={{ margin: "0 0 20px", fontSize: 14, color: C.gray500, lineHeight: 1.4 }}>
                {hasEmail
                  ? "Just your name and a password — that's it. Your search history carries over."
                  : expertContext
                    ? "Get free access to background, consultation rates, and availability — plus thousands of vetted federal and industry professionals."
                    : "Search experts, see full match details, and request consultations across 17,000+ federal SMEs."}
              </p>

              {/* Email — pre-filled and locked if already captured */}
              {hasEmail ? (
                <div style={{ display: "flex", alignItems: "center", gap: 8, padding: "10px 14px", background: C.gray50, borderRadius: 8, border: `1px solid ${C.gray200}`, marginBottom: 12 }}>
                  <Icon name="mail" size={16} color={C.green} />
                  <span style={{ fontSize: 14, color: C.gray700, flex: 1 }}>{userInfo.email}</span>
                  <Icon name="check" size={14} color={C.green} />
                </div>
              ) : (
                <input placeholder="Work Email" value={email} onChange={e => setEmail(e.target.value)}
                  style={{ width: "100%", padding: "12px 14px", borderRadius: 8, border: `1px solid ${C.gray200}`, fontSize: 14, marginBottom: 12, fontFamily: "inherit", outline: "none", boxSizing: "border-box" }} />
              )}

              {/* Name fields */}
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 12 }}>
                <input placeholder="First Name" value={firstName} onChange={e => setFirstName(e.target.value)} autoFocus={hasEmail}
                  style={{ padding: "12px 14px", borderRadius: 8, border: `1px solid ${C.gray200}`, fontSize: 14, fontFamily: "inherit", outline: "none" }}
                  onFocus={e => e.target.style.borderColor = C.teal} onBlur={e => e.target.style.borderColor = C.gray200} />
                <input placeholder="Last Name" value={lastName} onChange={e => setLastName(e.target.value)}
                  style={{ padding: "12px 14px", borderRadius: 8, border: `1px solid ${C.gray200}`, fontSize: 14, fontFamily: "inherit", outline: "none" }}
                  onFocus={e => e.target.style.borderColor = C.teal} onBlur={e => e.target.style.borderColor = C.gray200} />
              </div>

              {/* Company — editable, pre-filled from email domain when available */}
              <div style={{ position: "relative", marginBottom: 12 }}>
                <input placeholder="Company" value={company} onChange={e => setCompany(e.target.value)}

                  onFocus={e => e.target.style.borderColor = C.teal} onBlur={e => e.target.style.borderColor = companyWasInferred && company === userInfo?.company ? C.teal + '30' : C.gray200} />
                <Icon name="building" size={14} color={companyWasInferred ? C.teal : C.gray400} style={{ position: "absolute", left: 12, top: 14, pointerEvents: "none" }} />
                {companyWasInferred && company === userInfo?.company && (
                  <span style={{ position: "absolute", right: 12, top: 14, fontSize: 10, color: C.gray400 }}>from your email</span>

              <input type="password" placeholder="Create a password (6+ characters)" value={password} onChange={e => setPassword(e.target.value)}

                onFocus={e => e.target.style.borderColor = C.teal} onBlur={e => e.target.style.borderColor = C.gray200} />

              <label style={{ display: "flex", alignItems: "flex-start", gap: 8, fontSize: 12, color: C.gray500, marginBottom: 16, cursor: "pointer" }}

                <input type="checkbox" checked={agreed} onChange={() => {}} style={{ marginTop: 2 }} />
                <span>I have read and agree to OnFrontiers <span style={{ color: C.teal, fontWeight: 500 }}>Privacy Policy</span> & <span style={{ color: C.teal, fontWeight: 500 }}>Terms of Use</span></span>
              </label>

              {formError && <div style={{ fontSize: 12, color: C.red, marginBottom: 12 }}>{formError}</div>}

                    <Icon name="check" size={12} color={C.green} />
                    <span style={{ fontSize: 11, color: C.gray600 }}>{text}</span>
                  </div>
                ))}
              </div>

              <p style={{ textAlign: "center", fontSize: 13, color: C.gray700, margin: "12px 0 0", fontWeight: 500 }}>
                Already have an account? <span onClick={() => setMode("signin")} style={{ color: C.teal, fontWeight: 600, cursor: "pointer" }}>Sign in</span>
              </p>
            </>
          ) : (
            <>

              <p style={{ margin: "0 0 24px", fontSize: 14, color: C.gray500 }}>Sign in to your OnFrontiers account.</p>

              <input placeholder="Email" value={email} onChange={e => setEmail(e.target.value)}

              <input type="password" placeholder="Password" value={password} onChange={e => setPassword(e.target.value)}

          )}
        </div>
      </div>
    </div>
  );
}

    const t2 = setTimeout(() => setLoadPhase(2), 700);
    const t3 = setTimeout(() => setLoadPhase(3), 1000);
    return () => { clearTimeout(t1); clearTimeout(t2); clearTimeout(t3); };
  }, []);

  // AI-inferred parameters from free text — all editable
  const inferAgency = () => {
    const l = query.toLowerCase();
    if (l.includes("va") || l.includes("veteran")) return "Department of Veterans Affairs";
    if (l.includes("dhs")) return "Department of Homeland Security";
    if (l.includes("dod") || l.includes("defense")) return "Department of Defense";
    if (l.includes("navy") || l.includes("navwar")) return "Department of the Navy";
    return "Not specified — click to set";
  };
  const inferDomain = () => {
    const l = query.toLowerCase();
    if (l.includes("cyber")) return "Cybersecurity";
    if (l.includes("health")) return "Health IT";
    if (l.includes("proposal")) return "Proposal Support";
    if (l.includes("cloud")) return "Cloud & Infrastructure";
    if (l.includes("data")) return "Data Analytics";
    return "General";
  };

  const [inferredValues, setInferredValues] = useState({
    topic: query.length > 60 ? query.substring(0, 60) + "..." : query,
    agency: inferAgency(),
    domain: inferDomain(),
    naics: "Not specified — click to set",
  });

  // Generated AI summary for non-opportunity queries
  const generatedSummary = `Based on your query, you appear to be looking for expertise related to ${inferredValues.domain.toLowerCase()} within the ${inferredValues.agency !== "Not specified — click to set" ? inferredValues.agency : "federal government"}. This type of engagement typically involves subject matter experts who can provide strategic guidance, technical reviews, or intelligence briefings on ${inferredValues.topic.toLowerCase().replace("...", "")}. We'll match experts based on relevant agency experience, domain expertise, and the specific service types you select below.`;

  const roles = ["Agency SME", "Program SME", "Technical SME", "Contractor SME", "Acquisition SME", "Capture Manager", "Proposal Manager", "Proposal Writer", "Solution Architect", "Pricing Expert"];
  const services = ["Intelligence Briefing", "Black Hat Review", "Technical Review", "Proposal Review", "Strategy Session", "Capture Planning", "Price-to-Win Analysis", "Customer Engagement Prep"];

  const toggleItem = (item, list, setter) => {
    setter(prev => prev.includes(item) ? prev.filter(x => x !== item) : [...prev, item]);
  };

  // Skeleton placeholder
  const Skeleton = ({ width, height = 14, style: sx }) => (
    <div style={{ width, height, borderRadius: 4, background: `linear-gradient(90deg, ${C.gray100} 25%, ${C.gray200} 50%, ${C.gray100} 75%)`, backgroundSize: "200% 100%", animation: "shimmer 1.5s infinite", ...sx }} />
  );

  // Inline editable inferred field
  const InferredField = ({ fieldKey, label }) => {
    const isEditing = editingField === fieldKey;
    const val = inferredValues[fieldKey];
    const isPlaceholder = val.includes("click to set");
    return (
      <div>
        <div style={{ fontSize: 11, color: C.gray400 }}>{label}</div>
        {isEditing ? (
          <div style={{ display: "flex", alignItems: "center", gap: 4, marginTop: 2 }}>
            <input autoFocus value={isPlaceholder ? "" : val}
              onChange={e => setInferredValues(prev => ({ ...prev, [fieldKey]: e.target.value }))}
              onKeyDown={e => { if (e.key === "Enter") setEditingField(null); if (e.key === "Escape") setEditingField(null); }}
              onBlur={() => setEditingField(null)}
              placeholder={`Enter ${label.toLowerCase()}...`}
              style={{ fontSize: 13, fontWeight: 500, color: C.gray700, border: `1.5px solid ${C.teal}`, borderRadius: 4, padding: "2px 6px", outline: "none", width: "100%", fontFamily: "inherit" }}
            />
          </div>
        ) : (
          <div onClick={() => setEditingField(fieldKey)}
            style={{ fontSize: 13, fontWeight: 500, color: isPlaceholder ? C.gray400 : C.gray700, marginTop: 2, cursor: "pointer", display: "flex", alignItems: "center", gap: 4 }}
            onMouseEnter={e => e.currentTarget.style.color = C.teal}
            onMouseLeave={e => e.currentTarget.style.color = isPlaceholder ? C.gray400 : C.gray700}
          >
            {val}
            <Icon name="edit" size={10} color={C.gray300} style={{ opacity: 0.5, flexShrink: 0 }} />
          </div>
        )}
      </div>
    );
  };

  return (
    <div style={{ background: C.white, borderRadius: 16, border: `1px solid ${C.gray200}`, padding: "28px 32px", maxWidth: 720, width: "100%", boxShadow: "0 4px 24px rgba(0,0,0,0.06)" }}>
      <style>{`@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }`}</style>

      {/* Header with provenance */}
      <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 16 }}>
        <Icon name="zap" size={18} color={C.orange} />
        <span style={{ fontSize: 13, fontWeight: 600, color: C.gray700 }}>Here's what we understood — adjust anything that's off</span>
        <div style={{ padding: "2px 8px", borderRadius: 4, background: `${C.orange}10`, fontSize: 11, fontWeight: 600, color: C.orange, marginLeft: "auto" }}>
          AI-inferred
        </div>
      </div>

      <h2 style={{ fontSize: 20, fontWeight: 700, color: C.gray900, margin: "0 0 16px" }}>Refine Your Expert Search</h2>

      {/* Inferred context — phase 1, editable fields */}
      <div style={{ background: C.gray50, borderRadius: 10, padding: "14px 16px", marginBottom: 16, border: `1px solid ${C.gray200}`, transition: "opacity 0.4s ease", opacity: loadPhase >= 1 ? 1 : 0.3 }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
          <div style={{ fontSize: 11, fontWeight: 600, color: C.gray400, textTransform: "uppercase", letterSpacing: 0.5 }}>Interpreted from your query</div>
          <span style={{ fontSize: 10, color: C.gray400 }}>Click any field to edit</span>
        </div>
        {loadPhase >= 1 ? (
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "8px 24px" }}>
            <InferredField fieldKey="topic" label="Topic" />
            <InferredField fieldKey="agency" label="Agency" />
            <InferredField fieldKey="domain" label="Domain" />
            <InferredField fieldKey="naics" label="NAICS Code" />
          </div>
        ) : (
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "8px 24px" }}>
            {[1, 2, 3, 4].map(i => (
              <div key={i}>
                <Skeleton width="40%" height={10} style={{ marginBottom: 4 }} />
                <Skeleton width="80%" />
              </div>
            ))}
          </div>
        )}
      </div>

      {/* AI-generated analysis — collapsible, phase 1 */}
      {loadPhase >= 1 && (
        <div style={{ marginBottom: 16 }}>
          <button onClick={() => setShowSummary(!showSummary)} style={{
            display: "flex", alignItems: "center", gap: 8, width: "100%", padding: "10px 14px",
            background: showSummary ? `${C.orange}06` : C.gray50, borderRadius: showSummary ? "8px 8px 0 0" : 8,
            border: `1px solid ${showSummary ? `${C.orange}20` : C.gray200}`, cursor: "pointer",
          }}>
            <Icon name="zap" size={14} color={C.orange} />
            <span style={{ fontSize: 12, fontWeight: 600, color: C.gray600, flex: 1, textAlign: "left" }}>AI Search Analysis</span>
            <span style={{ fontSize: 10, color: C.gray400 }}>Generated from your input</span>
            <Icon name={showSummary ? "chevDown" : "chevRight"} size={12} color={C.gray400} />
          </button>
          {showSummary && (
            <div style={{ padding: "14px", background: C.gray50, borderRadius: "0 0 8px 8px", border: `1px solid ${C.gray200}`, borderTop: "none" }}>
              <p style={{ fontSize: 13, color: C.gray600, lineHeight: 1.6, margin: 0 }}>{generatedSummary}</p>
              <div style={{ marginTop: 8, fontSize: 10, color: C.gray400 }}>
                This analysis is generated from your query text. Add more context below to improve accuracy.
              </div>
            </div>
          )}
        </div>
      )}

      {/* Expert roles — phase 2 */}
      <div style={{ marginBottom: 20, transition: "opacity 0.4s ease", opacity: loadPhase >= 2 ? 1 : 0.3 }}>
        <div style={{ fontSize: 11, fontWeight: 600, color: C.gray400, textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 8 }}>What type of expert do you need?</div>
        {loadPhase >= 2 ? (
          <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
            {roles.map(role => (
              <button key={role} onClick={() => toggleItem(role, selectedRoles, setSelectedRoles)} style={{
                padding: "5px 12px", borderRadius: 6, fontSize: 12, fontWeight: 600, cursor: "pointer",
                border: `1.5px solid ${selectedRoles.includes(role) ? C.teal : C.gray200}`,
                background: selectedRoles.includes(role) ? `${C.teal}08` : "white",
                color: selectedRoles.includes(role) ? C.teal : C.gray500,
              }}>{role}</button>
            ))}
          </div>
        ) : (
          <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
            {[70, 85, 95, 100, 90, 80].map((w, i) => <Skeleton key={i} width={w} height={28} style={{ borderRadius: 6 }} />)}
          </div>
        )}
      </div>

      {/* Service type — phase 2 */}
      <div style={{ marginBottom: 20, transition: "opacity 0.4s ease", opacity: loadPhase >= 2 ? 1 : 0.3 }}>
        <div style={{ fontSize: 11, fontWeight: 600, color: C.gray400, textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 8 }}>What service are you looking for?</div>
        {loadPhase >= 2 ? (
          <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
            {services.map(svc => (
              <button key={svc} onClick={() => toggleItem(svc, selectedServices, setSelectedServices)} style={{
                padding: "5px 12px", borderRadius: 6, fontSize: 12, fontWeight: 600, cursor: "pointer",
                border: `1.5px solid ${selectedServices.includes(svc) ? C.blue : C.gray200}`,
                background: selectedServices.includes(svc) ? `${C.blue}08` : "white",
                color: selectedServices.includes(svc) ? C.blue : C.gray500,
              }}>{svc}</button>
            ))}
          </div>
        ) : (
          <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
            {[110, 90, 100, 85, 95].map((w, i) => <Skeleton key={i} width={w} height={28} style={{ borderRadius: 6 }} />)}
          </div>
        )}
      </div>

      {/* Urgency — phase 2 */}
      <div style={{ marginBottom: 20, transition: "opacity 0.4s ease", opacity: loadPhase >= 2 ? 1 : 0.3 }}>
        <div style={{ fontSize: 11, fontWeight: 600, color: C.gray400, textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 8 }}>Timeline</div>
        {loadPhase >= 2 ? (
          <div style={{ display: "flex", gap: 8 }}>
            {[
              { key: "urgent", label: "Urgent (48hrs)", color: C.red },
              { key: "standard", label: "Standard (1 week)", color: C.teal },
              { key: "flexible", label: "Flexible", color: C.gray500 },
            ].map(t => (
              <button key={t.key} onClick={() => setUrgency(t.key)} style={{
                padding: "8px 16px", borderRadius: 8, fontSize: 13, fontWeight: 600, cursor: "pointer",
                border: `1.5px solid ${urgency === t.key ? t.color : C.gray200}`,
                background: urgency === t.key ? `${t.color}08` : "white",
                color: urgency === t.key ? t.color : C.gray500,
              }}>{t.label}</button>
            ))}
          </div>
        ) : (
          <div style={{ display: "flex", gap: 8 }}>
            {[120, 130, 80].map((w, i) => <Skeleton key={i} width={w} height={36} style={{ borderRadius: 8 }} />)}
          </div>
        )}
      </div>

      {/* Additional context — phase 3 */}
      <div style={{ transition: "opacity 0.4s ease, transform 0.4s ease", opacity: loadPhase >= 3 ? 1 : 0, transform: loadPhase >= 3 ? "translateY(0)" : "translateY(8px)" }}>
        <div style={{ marginBottom: 16 }}>
          <div style={{ fontSize: 11, fontWeight: 600, color: C.gray400, textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 6 }}>Additional context <span style={{ fontWeight: 400, textTransform: "none", letterSpacing: 0 }}>(optional)</span></div>
          <textarea
            placeholder="Add any details that would help us find the right experts — specific technologies, contract context, team needs, competitive landscape..."
            value={additionalContext}
            onChange={e => setAdditionalContext(e.target.value)}
            rows={2}
            style={{ width: "100%", fontSize: 13, color: C.gray700, border: `1px solid ${C.gray200}`, borderRadius: 8, padding: "10px 12px", outline: "none", fontFamily: "inherit", resize: "vertical", background: C.gray50, boxSizing: "border-box" }}
            onFocus={e => e.target.style.borderColor = C.teal}
            onBlur={e => e.target.style.borderColor = C.gray200}
          />
          <div style={{ fontSize: 10, color: C.gray400, marginTop: 4 }}>
            This context will be saved to your search record and can drive future expert recommendations.
          </div>
        </div>

        {/* CTA */}
        <div style={{ display: "flex", gap: 12 }}>
          <button onClick={onBack} style={{ flex: 0, padding: "12px 20px", background: C.white, color: C.gray600, border: `1px solid ${C.gray200}`, borderRadius: 10, fontSize: 14, fontWeight: 600, cursor: "pointer" }}>
            Back
          </button>
          <button onClick={onConfirm} style={{ flex: 1, padding: "12px", background: C.teal, color: C.white, border: "none", borderRadius: 10, fontSize: 15, fontWeight: 700, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", gap: 8 }}>
            Find Experts
            <Icon name="arrowRight" size={18} color={C.white} />
          </button>
        </div>
      </div>
    </div>
  );
}

                  background: stage === s ? `${C.teal}08` : "white",
                  color: stage === s ? C.teal : C.gray500,
                }}>{s}</button>
              ))}
            </div>
          ) : (
            <div style={{ display: "flex", gap: 6 }}>
              {[80, 120, 100, 90].map((w, i) => <Skeleton key={i} width={w} height={28} style={{ borderRadius: 6 }} />)}
            </div>
          )}
        </div>

        {/* Recommended Services */}
        <div style={{ marginBottom: 20 }}>
          <div style={{ fontSize: 11, fontWeight: 600, color: C.gray400, textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 8 }}>Recommended Services</div>
          {loadPhase >= 2 ? (
            <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
              {suggestedServices.map(svc => (
                <div key={svc.name} style={{ display: "flex", alignItems: "center", gap: 12, padding: "10px 14px", background: C.gray50, borderRadius: 8, border: `1px solid ${C.gray200}` }}>
                  <Icon name={svc.icon} size={18} color={C.teal} />
                  <div>
                    <div style={{ fontSize: 13, fontWeight: 600, color: C.gray800 }}>{svc.name}</div>
                    <div style={{ fontSize: 12, color: C.gray500 }}>{svc.desc}</div>
                  </div>
                </div>
              ))}
            </div>
          ) : (
            <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
              {[1, 2, 3].map(i => <Skeleton key={i} width="100%" height={44} style={{ borderRadius: 8 }} />)}
            </div>
          )}
        </div>
      </div>

      {/* Your Intelligence section — phase 3 */}
      <div style={{ transition: "opacity 0.4s ease, transform 0.4s ease", opacity: loadPhase >= 3 ? 1 : 0, transform: loadPhase >= 3 ? "translateY(0)" : "translateY(8px)" }}>
        {!showIntelSection ? (
          <button onClick={() => setShowIntelSection(true)} style={{
            display: "flex", alignItems: "center", gap: 8, width: "100%", padding: "12px 16px",
            background: C.white, borderRadius: 10, border: `1.5px dashed ${C.teal}40`, cursor: "pointer",
            marginBottom: 16, transition: "all 0.15s",
          }}
            onMouseEnter={e => { e.currentTarget.style.borderColor = C.teal; e.currentTarget.style.background = `${C.teal}04`; }}
            onMouseLeave={e => { e.currentTarget.style.borderColor = `${C.teal}40`; e.currentTarget.style.background = C.white; }}
          >
            <div style={{ width: 28, height: 28, borderRadius: "50%", background: `${C.teal}10`, display: "flex", alignItems: "center", justifyContent: "center" }}>
              <span style={{ fontSize: 16, lineHeight: 1 }}>+</span>
            </div>
            <div style={{ textAlign: "left" }}>
              <div style={{ fontSize: 13, fontWeight: 600, color: C.gray800 }}>Add what you know</div>
              <div style={{ fontSize: 11, color: C.gray500 }}>Competitors, teammates, strategy notes — your intel improves matching</div>
            </div>
          </button>
        ) : (
          <div style={{ padding: "16px 20px", background: `${C.teal}04`, borderRadius: 12, border: `1px solid ${C.teal}20`, marginBottom: 16 }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 12 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                <Icon name="shield" size={16} color={C.teal} />
                <span style={{ fontSize: 13, fontWeight: 600, color: C.gray800 }}>Your Intelligence</span>
              </div>
              <span style={{ fontSize: 10, color: C.gray400, display: "flex", alignItems: "center", gap: 4 }}>
                <Icon name="lock" size={10} color={C.gray400} /> Private to your account
              </span>
            </div>

            {/* Known competitors */}
            <div style={{ marginBottom: 14 }}>
              <div style={{ fontSize: 11, fontWeight: 600, color: C.gray500, textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 6 }}>Known / Expected Competitors</div>
              {competitors.map((comp, i) => (
                <div key={i} style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 4 }}>
                  <input
                    placeholder={i === 0 ? "e.g., SAIC, Booz Allen Hamilton..." : "Add another competitor..."}
                    value={comp}
                    onChange={e => { const n = [...competitors]; n[i] = e.target.value; setCompetitors(n); }}
                    onKeyDown={e => { if (e.key === "Enter" && comp.trim()) setCompetitors([...competitors, ""]); }}
                    style={{ flex: 1, fontSize: 13, color: C.gray700, border: `1px solid ${C.gray200}`, borderRadius: 6, padding: "6px 10px", outline: "none", fontFamily: "inherit", background: C.white }}
                  />
                  {competitors.length > 1 && (
                    <button onClick={() => setCompetitors(competitors.filter((_, j) => j !== i))} style={{ background: "none", border: "none", cursor: "pointer", padding: 2 }}>
                      <Icon name="x" size={14} color={C.gray400} />
                    </button>
                  )}
                </div>
              ))}
              {competitors[competitors.length - 1]?.trim() && (
                <button onClick={() => setCompetitors([...competitors, ""])} style={{ background: "none", border: "none", color: C.teal, fontSize: 12, fontWeight: 600, cursor: "pointer", padding: "4px 0", display: "flex", alignItems: "center", gap: 4 }}>
                  + Add competitor
                </button>
              )}
            </div>

            {/* Strategy notes */}
            <div>
              <div style={{ fontSize: 11, fontWeight: 600, color: C.gray500, textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 6 }}>Strategy Notes</div>
              <textarea
                placeholder="Add insider knowledge, win themes, team strategy, or anything that will help us find the right experts..."
                value={userNotes}
                onChange={e => setUserNotes(e.target.value)}
                rows={3}
                style={{ width: "100%", fontSize: 13, color: C.gray700, border: `1px solid ${C.gray200}`, borderRadius: 6, padding: "8px 10px", outline: "none", fontFamily: "inherit", resize: "vertical", background: C.white, boxSizing: "border-box" }}
              />
            </div>

            <div style={{ marginTop: 10, fontSize: 11, color: C.gray400, lineHeight: 1.4 }}>
              This information improves expert matching and is saved to your opportunity record for future searches.
            </div>
          </div>
        )}

        {/* CTA */}
        <button onClick={onViewResults} style={{
          width: "100%", padding: "12px", background: C.teal, color: C.white, border: "none", borderRadius: 10,
          fontSize: 15, fontWeight: 700, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", gap: 8,
        }}>
          View Matched Experts <Icon name="arrowRight" size={18} color={C.white} />
        </button>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// QUERY PROCESSING INTERSTITIAL
// ═══════════════════════════════════════════════════════════

function QueryProcessingScreen({ query, isOpportunity, onComplete, requiresEmail, onEmailCaptured, searchCount }) {
  const [phase, setPhase] = useState(0);
  const [progress, setProgress] = useState(0);
  const [dots, setDots] = useState("");
  const [paused, setPaused] = useState(false);
  const [emailValue, setEmailValue] = useState("");
  const [emailSubmitted, setEmailSubmitted] = useState(false);
  const [emailError, setEmailError] = useState("");
  const pausedRef = useRef(false);

  // The email gate pauses after the classification phase (phase 1)
  // so the user sees that we *understood* their query before asking for email
  const EMAIL_GATE_PHASE = 1;

  // Define phases based on query type
  const oppPhases = [
    { icon: "search", label: "Analyzing your query", detail: "Detecting input type and extracting identifiers..." },
    { icon: "globe", label: "Recognized as opportunity", detail: "Solicitation pattern detected — checking cache..." },
    { icon: "building", label: "Enriching from GovTribe", detail: "Pulling opportunity details, agency info, NAICS, incumbents, and contract history..." },
    { icon: "zap", label: "Generating AI analysis", detail: "Summarizing opportunity scope and identifying expert alignment criteria..." },
    { icon: "shield", label: "Matching expert profiles", detail: "Cross-referencing 17,000+ SMEs against opportunity requirements..." },
    { icon: "check", label: "Results ready", detail: "Found matching experts — preparing enrichment view..." },
  ];

  const genPhases = [
    { icon: "search", label: "Analyzing your query", detail: "Understanding the intent and domain of your search..." },
    { icon: "zap", label: "Interpreting parameters", detail: "Inferring agency, topic area, NAICS codes, and expert type from your input..." },
    { icon: "document", label: "Generating search context", detail: "Building a structured search profile from your query..." },
    { icon: "shield", label: "Matching expert profiles", detail: "Searching 17,000+ SMEs for domain alignment..." },
    { icon: "check", label: "Results ready", detail: "Found matching experts — preparing confirmation view..." },
  ];

  const phases = isOpportunity ? oppPhases : genPhases;

  // Animate dots
  useEffect(() => {
    const interval = setInterval(() => {
      setDots(prev => prev.length >= 3 ? "" : prev + ".");
    }, 400);
    return () => clearInterval(interval);
  }, []);

  // Email validation & domain intelligence
  const validateEmail = (email) => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
  const PERSONAL_DOMAINS = ["gmail.com", "yahoo.com", "hotmail.com", "outlook.com", "aol.com", "icloud.com", "me.com", "mail.com", "protonmail.com", "zoho.com", "yandex.com", "live.com", "msn.com", "comcast.net", "att.net", "verizon.net", "cox.net"];

  const getEmailDomain = (email) => {
    const parts = email.split("@");
    return parts.length === 2 ? parts[1].toLowerCase() : "";
  };
  const isPersonalEmail = (email) => PERSONAL_DOMAINS.includes(getEmailDomain(email));
  const isWorkEmail = (email) => validateEmail(email) && !isPersonalEmail(email);

  // Track whether user has attempted personal email
  const [showPersonalNudge, setShowPersonalNudge] = useState(false);
  const [personalEmailAllowed, setPersonalEmailAllowed] = useState(false);

  const handleEmailSubmit = () => {
    if (!validateEmail(emailValue)) {
      setEmailError("Please enter a valid email address");
      return;
    }
    // Nudge toward work email on first personal email attempt
    if (isPersonalEmail(emailValue) && !personalEmailAllowed) {
      setShowPersonalNudge(true);
      setEmailError("");
      return;
    }
    setEmailError("");
    setEmailSubmitted(true);
    onEmailCaptured(emailValue);
    setTimeout(() => {
      pausedRef.current = false;
      setPaused(false);
    }, 800);
  };

  const handleContinueWithPersonal = () => {
    setPersonalEmailAllowed(true);
    setEmailSubmitted(true);
    onEmailCaptured(emailValue);
    setShowPersonalNudge(false);
    setTimeout(() => {
      pausedRef.current = false;
      setPaused(false);
    }, 800);
  };

  // Simulate phased processing with realistic timing
  useEffect(() => {
    const timings = isOpportunity
      ? [700, 800, 2200, 1200, 1200, 500]
      : [700, 1200, 1000, 1000, 500];

    let elapsed = 0;
    const totalTime = timings.reduce((a, b) => a + b, 0);
    const timeouts = [];

    timings.forEach((delay, i) => {
      elapsed += delay;
      timeouts.push(setTimeout(() => {
        // If paused, don't advance past the gate
        if (pausedRef.current) return;
        setPhase(i);
        setProgress(Math.min(((i + 1) / phases.length) * 100, 100));
        // Check if we should pause for email gate
        if (requiresEmail && i === EMAIL_GATE_PHASE && !emailSubmitted) {
          pausedRef.current = true;
          setPaused(true);
          return;
        }
        if (i === phases.length - 1) {
          setTimeout(() => onComplete(), 500);
        }
      }, elapsed - delay));
    });

    timeouts.push(setTimeout(() => {
      if (!pausedRef.current) {
        setPhase(phases.length - 1);
        setProgress(100);
      }
    }, totalTime - 400));

    const progressInterval = setInterval(() => {
      if (pausedRef.current) return;
      setProgress(prev => {
        const target = ((phase + 1) / phases.length) * 100;
        if (prev < target) return Math.min(prev + 0.5, target);
        return prev;
      });
    }, 30);

    return () => {
      timeouts.forEach(clearTimeout);
      clearInterval(progressInterval);
    };
  }, []);

  // After email is captured and paused is lifted, resume the remaining phases
  useEffect(() => {
    if (!paused && emailSubmitted) {
      const remainingPhases = phases.slice(EMAIL_GATE_PHASE + 1);
      const timings = isOpportunity
        ? [2200, 1200, 1200, 500]
        : [1000, 1000, 500];

      let elapsed = 0;
      const timeouts = [];
      remainingPhases.forEach((_, i) => {
        const phaseIndex = EMAIL_GATE_PHASE + 1 + i;
        elapsed += timings[i] || 800;
        timeouts.push(setTimeout(() => {
          setPhase(phaseIndex);
          setProgress(Math.min(((phaseIndex + 1) / phases.length) * 100, 100));
          if (phaseIndex === phases.length - 1) {
            setTimeout(() => onComplete(), 500);
          }
        }, elapsed));
      });

      return () => timeouts.forEach(clearTimeout);
    }
  }, [paused, emailSubmitted]);

  const currentPhase = phases[Math.min(phase, phases.length - 1)];
  const isComplete = phase === phases.length - 1;

  return (
    <div style={{
      minHeight: "100vh", background: C.gray50, fontFamily: '-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif',
      display: "flex", flexDirection: "column",
    }}>
      {/* Slim nav */}
      <nav style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "12px 32px", background: C.white, borderBottom: `1px solid ${C.gray200}` }}>
        <OFLogo color={C.dark} />
        <div style={{ flex: 1, maxWidth: 480, margin: "0 24px" }}>
          <div style={{ display: "flex", alignItems: "center", background: C.gray50, borderRadius: 8, border: `1px solid ${C.gray200}`, padding: "0 12px" }}>
            <Icon name="search" size={16} color={C.gray400} />
            <div style={{ flex: 1, fontSize: 13, color: C.gray700, padding: "10px 8px", fontFamily: "inherit", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
              {query}
            </div>
          </div>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
          <button style={{ padding: "8px 16px", borderRadius: 6, border: `1px solid ${C.gray300}`, background: "transparent", color: C.gray700, fontSize: 13, fontWeight: 600, cursor: "pointer" }}>Log In</button>
          <button style={{ padding: "8px 16px", borderRadius: 6, border: "none", background: C.teal, color: C.white, fontSize: 13, fontWeight: 600, cursor: "pointer" }}>Sign Up Free</button>
        </div>
      </nav>

      {/* Processing area */}
      <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", padding: "40px 32px" }}>
        <div style={{ maxWidth: 520, width: "100%", textAlign: "center" }}>

          {/* Animated icon */}
          <div style={{
            width: 72, height: 72, borderRadius: "50%", margin: "0 auto 24px",
            background: paused ? `${C.amber}12` : isComplete ? `${C.green}12` : `${C.teal}10`,
            border: `2px solid ${paused ? `${C.amber}30` : isComplete ? `${C.green}30` : `${C.teal}30`}`,
            display: "flex", alignItems: "center", justifyContent: "center",
            transition: "all 0.4s ease",
          }}>
            <Icon name={paused ? "mail" : currentPhase.icon} size={28} color={paused ? C.amber : isComplete ? C.green : C.teal} />
          </div>

          {/* Current phase label / Email gate */}
          {paused && !emailSubmitted ? (
            <>
              <h2 style={{ fontSize: 22, fontWeight: 700, color: C.gray900, margin: "0 0 6px" }}>
                {isOpportunity ? "Opportunity identified" : "Query analyzed"} — one more step
              </h2>
              <p style={{ fontSize: 14, color: C.gray500, margin: "0 0 24px", lineHeight: 1.5, maxWidth: 420, marginLeft: "auto", marginRight: "auto" }}>
                Enter your work email to unlock full enrichment, expert matching, and save this search to your account.
              </p>

              {/* Email capture card */}
              <div style={{
                maxWidth: 420, margin: "0 auto 24px", padding: "24px", background: C.white, borderRadius: 12,
                border: `1px solid ${C.gray200}`, boxShadow: "0 4px 16px rgba(0,0,0,0.06)", textAlign: "left",
              }}>
                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 12 }}>
                  <div style={{ fontSize: 11, fontWeight: 600, color: C.gray400, textTransform: "uppercase", letterSpacing: 0.5 }}>
                    Continue your search
                  </div>
                  <div style={{ display: "flex", alignItems: "center", gap: 4, fontSize: 10, color: C.teal, fontWeight: 600 }}>
                    <Icon name="building" size={10} color={C.teal} />
                    Work email recommended
                  </div>
                </div>

                {/* Work email nudge banner (shown when personal email detected) */}
                {showPersonalNudge && !personalEmailAllowed && (
                  <div style={{
                    padding: "12px 14px", marginBottom: 12, background: `${C.amber}08`, borderRadius: 8,
                    border: `1px solid ${C.amber}25`,
                  }}>
                    <div style={{ display: "flex", alignItems: "flex-start", gap: 8 }}>
                      <Icon name="building" size={16} color={C.amber} style={{ flexShrink: 0, marginTop: 1 }} />
                      <div>
                        <div style={{ fontSize: 13, fontWeight: 600, color: C.gray800, marginBottom: 4 }}>
                          Use your work email for the best experience
                        </div>
                        <div style={{ fontSize: 12, color: C.gray500, lineHeight: 1.4, marginBottom: 10 }}>
                          Work emails unlock company-matched results, team sharing, and priority support. We also use your company domain to tailor expert recommendations to your organization's focus areas.
                        </div>
                        <div style={{ display: "flex", gap: 8 }}>
                          <button onClick={() => { setShowPersonalNudge(false); setEmailValue(""); }} style={{
                            padding: "6px 14px", background: C.teal, color: C.white, border: "none",
                            borderRadius: 6, fontSize: 12, fontWeight: 600, cursor: "pointer",
                          }}>
                            Enter work email
                          </button>
                          <button onClick={handleContinueWithPersonal} style={{
                            padding: "6px 14px", background: "transparent", color: C.gray500, border: `1px solid ${C.gray200}`,
                            borderRadius: 6, fontSize: 12, fontWeight: 500, cursor: "pointer",
                          }}>
                            Continue with {getEmailDomain(emailValue)}
                          </button>
                        </div>
                      </div>
                    </div>
                  </div>
                )}

                {/* Email input */}
                <div style={{ display: "flex", gap: 8 }}>
                  <div style={{ flex: 1, position: "relative" }}>
                    <input
                      type="email" autoFocus
                      placeholder="you@company.com"
                      value={emailValue}
                      onChange={e => { setEmailValue(e.target.value); setEmailError(""); setShowPersonalNudge(false); }}
                      onKeyDown={e => e.key === "Enter" && handleEmailSubmit()}
                      style={{
                        width: "100%", fontSize: 14, color: C.gray700,
                        border: `1.5px solid ${emailError ? C.red : isWorkEmail(emailValue) ? C.green : C.gray200}`,
                        borderRadius: 8, padding: "10px 14px", paddingRight: isWorkEmail(emailValue) ? 36 : 14,
                        outline: "none", fontFamily: "inherit", transition: "border-color 0.15s", boxSizing: "border-box",
                      }}
                      onFocus={e => { if (!emailError && !isWorkEmail(emailValue)) e.target.style.borderColor = C.teal; }}
                      onBlur={e => { if (!emailError && !isWorkEmail(emailValue)) e.target.style.borderColor = C.gray200; }}
                    />
                    {/* Green check for work email */}
                    {isWorkEmail(emailValue) && (
                      <div style={{ position: "absolute", right: 10, top: "50%", transform: "translateY(-50%)" }}>
                        <Icon name="check" size={16} color={C.green} />
                      </div>
                    )}
                  </div>
                  <button onClick={handleEmailSubmit} style={{
                    padding: "10px 20px", background: C.teal, color: C.white, border: "none",
                    borderRadius: 8, fontSize: 14, fontWeight: 700, cursor: "pointer", whiteSpace: "nowrap",
                  }}>
                    Continue
                  </button>
                </div>

                {emailError && <div style={{ fontSize: 12, color: C.red, marginTop: 6 }}>{emailError}</div>}

                {/* Domain-aware messaging */}
                {isWorkEmail(emailValue) ? (
                  <div style={{ display: "flex", alignItems: "center", gap: 6, marginTop: 8 }}>
                    <Icon name="check" size={12} color={C.green} />
                    <span style={{ fontSize: 11, color: C.green, fontWeight: 500 }}>
                      Work email detected — you'll get company-matched results for {getEmailDomain(emailValue).split(".")[0].toUpperCase()}
                    </span>
                  </div>
                ) : emailValue.includes("@") && isPersonalEmail(emailValue) ? (
                  <div style={{ display: "flex", alignItems: "center", gap: 6, marginTop: 8 }}>
                    <Icon name="building" size={12} color={C.gray400} />
                    <span style={{ fontSize: 11, color: C.gray400 }}>
                      Tip: Work emails unlock company-matched results and team features
                    </span>
                  </div>
                ) : (
                  <div style={{ fontSize: 11, color: C.gray400, marginTop: 10, lineHeight: 1.4 }}>
                    Your first search was free. We ask for your email to prevent abuse and save your results. No spam.
                  </div>
                )}

                {/* Value prop — tiered by email type */}
                <div style={{ marginTop: 14, paddingTop: 14, borderTop: `1px solid ${C.gray100}` }}>
                  <div style={{ fontSize: 11, fontWeight: 600, color: C.gray500, marginBottom: 8 }}>
                    {isWorkEmail(emailValue) ? "With your work email you unlock:" : "With your email you unlock:"}
                  </div>
                  {[
                    { icon: "building", text: isOpportunity ? "Full GovTribe opportunity enrichment" : "AI-powered search context analysis", all: true },
                    { icon: "shield", text: "Expert matching across 17,000+ SMEs", all: true },
                    { icon: "bookmark", text: "Saved searches and opportunity tracking", all: true },
                    { icon: "user", text: "Free account creation (when ready)", all: true },
                    { icon: "globe", text: "Company-matched results tailored to your org", workOnly: true },
                    { icon: "list", text: "Team sharing and collaborative shortlists", workOnly: true },
                  ].filter(item => item.all || (item.workOnly && isWorkEmail(emailValue))).map((item, i) => (
                    <div key={i} style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6 }}>
                      <Icon name={item.icon} size={14} color={item.workOnly ? C.green : C.teal} />
                      <span style={{ fontSize: 12, color: C.gray600 }}>
                        {item.text}
                        {item.workOnly && <span style={{ fontSize: 10, color: C.green, fontWeight: 600, marginLeft: 4 }}>WORK EMAIL BONUS</span>}
                      </span>
                    </div>
                  ))}
                </div>
              </div>
            </>
          ) : paused && emailSubmitted ? (
            <>
              <h2 style={{ fontSize: 22, fontWeight: 700, color: C.green, margin: "0 0 6px" }}>
                Got it — resuming your search
              </h2>
              <p style={{ fontSize: 14, color: C.gray500, margin: "0 0 24px", lineHeight: 1.5 }}>
                Thanks! Now enriching your results...
              </p>
            </>
          ) : (
            <>
              <h2 style={{
                fontSize: 22, fontWeight: 700, color: C.gray900, margin: "0 0 6px",
                transition: "opacity 0.3s ease",
              }}>
                {currentPhase.label}{!isComplete ? dots : ""}
              </h2>
              <p style={{ fontSize: 14, color: C.gray500, margin: "0 0 32px", lineHeight: 1.5 }}>
                {currentPhase.detail}
              </p>
            </>
          )}

          {/* Progress bar */}
          <div style={{ maxWidth: 400, margin: "0 auto 32px" }}>
            <div style={{ height: 4, background: C.gray200, borderRadius: 2, overflow: "hidden" }}>
              <div style={{
                height: "100%",
                background: paused ? C.amber : isComplete ? C.green : `linear-gradient(90deg, ${C.teal}, ${C.tealLight})`,
                borderRadius: 2, transition: "width 0.3s ease, background 0.3s ease",
                width: `${progress}%`,
              }} />
            </div>
          </div>

          {/* Phase timeline */}
          <div style={{ display: "flex", flexDirection: "column", gap: 0, textAlign: "left", maxWidth: 380, margin: "0 auto" }}>
            {phases.map((p, i) => {
              const isActive = i === phase && !paused;
              const isPausePoint = paused && i === phase;
              const isDone = i < phase || (i === phase && paused && emailSubmitted);
              const isFuture = i > phase;
              return (
                <div key={i} style={{ display: "flex", alignItems: "flex-start", gap: 12, position: "relative" }}>
                  <div style={{ display: "flex", flexDirection: "column", alignItems: "center", flexShrink: 0 }}>
                    <div style={{
                      width: 24, height: 24, borderRadius: "50%", display: "flex", alignItems: "center", justifyContent: "center",
                      background: isDone ? C.green : isPausePoint ? C.amber : isActive ? C.teal : C.gray200,
                      transition: "all 0.3s ease",
                    }}>
                      {isDone ? (
                        <Icon name="check" size={12} color={C.white} />
                      ) : isPausePoint ? (
                        <Icon name="mail" size={11} color={C.white} />
                      ) : (
                        <div style={{
                          width: 8, height: 8, borderRadius: "50%",
                          background: isActive ? C.white : C.gray400,
                          animation: isActive ? "pulse 1.5s infinite" : "none",
                        }} />
                      )}
                    </div>
                    {i < phases.length - 1 && (
                      <div style={{
                        width: 2, height: 24,
                        background: isDone ? C.green : isPausePoint ? C.amber : C.gray200,
                        transition: "background 0.3s ease",
                      }} />
                    )}
                  </div>
                  <div style={{ paddingTop: 2, paddingBottom: i < phases.length - 1 ? 8 : 0 }}>
                    <div style={{
                      fontSize: 13, fontWeight: isActive || isDone || isPausePoint ? 600 : 400,
                      color: isFuture ? C.gray400 : isDone ? C.green : isPausePoint ? C.amber : C.gray800,
                      transition: "color 0.3s ease",
                    }}>
                      {isPausePoint && !emailSubmitted ? `${p.label} — email required` : p.label}
                    </div>
                  </div>
                </div>
              );
            })}
          </div>

          {/* Query context card */}
          <div style={{
            marginTop: 32, padding: "16px 20px", background: C.white, borderRadius: 10,
            border: `1px solid ${C.gray200}`, textAlign: "left",
          }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
              <div style={{ fontSize: 11, fontWeight: 600, color: C.gray400, textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 6 }}>
                Your search
              </div>
              {searchCount > 1 && (
                <div style={{ fontSize: 10, color: C.gray400 }}>Search #{searchCount} this session</div>
              )}
            </div>
            <div style={{ fontSize: 14, color: C.gray700, lineHeight: 1.5, wordBreak: "break-word" }}>
              {query}
            </div>
            {isOpportunity && (
              <div style={{ marginTop: 8, display: "flex", alignItems: "center", gap: 6 }}>
                <div style={{ padding: "2px 8px", borderRadius: 4, background: `${C.purple}10`, fontSize: 11, fontWeight: 600, color: C.purple }}>
                  Opportunity
                </div>
                <span style={{ fontSize: 11, color: C.gray400 }}>Data sourced from GovTribe</span>
              </div>
            )}
            {!isOpportunity && (
              <div style={{ marginTop: 8, display: "flex", alignItems: "center", gap: 6 }}>
                <div style={{ padding: "2px 8px", borderRadius: 4, background: `${C.blue}10`, fontSize: 11, fontWeight: 600, color: C.blue }}>
                  General Search
                </div>
                <span style={{ fontSize: 11, color: C.gray400 }}>AI-powered parameter inference</span>
              </div>
            )}
          </div>
        </div>
      </div>

      <style>{`
        @keyframes pulse {
          0%, 100% { opacity: 1; transform: scale(1); }
          50% { opacity: 0.5; transform: scale(0.8); }
        }
      `}</style>
    </div>
  );
}

                  <h3 style={{ margin: 0, fontSize: 16, fontWeight: 700, color: C.gray900 }}>{expert.name}</h3>

                  <h3 style={{ margin: 0, fontSize: 16, fontWeight: 700, color: C.gray900 }}>{expert.genericTitle}</h3>

                border: `3px solid ${expert.alignment >= 85 ? C.green : expert.alignment >= 75 ? C.tealLight : C.amber}`,

          {/* Tags - dimmed for visitor, full for free */}
          <div style={{ display: "flex", flexWrap: "wrap", gap: 4, marginTop: 8 }}>

              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                {canShortlist && (
                  <button
                    onClick={(e) => {
                      e.stopPropagation();

                      alignItems: "center",
                      justifyContent: "center",
                      width: 32,
                      height: 32,
                      borderRadius: 6,
                      background: isShortlisted ? C.amber : "white",

                      <path d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z" />

                  <div style={{ width: 44, height: 44, borderRadius: "50%", border: `3px solid ${expert.alignment >= 85 ? C.green : C.tealLight}`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 15, fontWeight: 800, color: expert.alignment >= 85 ? C.green : C.tealLight }}>
                    {expert.alignment}
                  </div>
                  <span style={{ fontSize: 10, color: C.gray400, fontWeight: 500, marginTop: 2 }}>Match</span>
                </div>
              </div>
            </div>
          ))}

          {/* Remaining count hint */}
          {opportunity.preMatchedCount > 3 && (
            <div style={{ padding: "12px 0", borderTop: `1px solid ${C.gray100}`, textAlign: "center" }}>
              <span style={{ fontSize: 13, color: C.gray500 }}>+ {opportunity.preMatchedCount - 3} more pre-matched expert{opportunity.preMatchedCount - 3 !== 1 ? "s" : ""}</span>
            </div>
          )}
        </div>

        {/* CTA */}
        <div style={{ background: `linear-gradient(135deg, ${C.teal}, ${C.teal}DD)`, borderRadius: 12, padding: "32px 28px", textAlign: "center" }}>
          <h2 style={{ margin: "0 0 8px", fontSize: 22, fontWeight: 700, color: C.white }}>Explore Experts for This Opportunity</h2>
          <p style={{ margin: "0 0 20px", fontSize: 14, color: "rgba(255,255,255,0.8)", lineHeight: 1.5 }}>
            Search our full network, refine by role and domain, and build your shortlist
          </p>
          <button onClick={onExplore} style={{
            padding: "14px 36px", borderRadius: 10, border: `2px solid ${C.white}`, background: C.white,
            color: C.teal, fontSize: 16, fontWeight: 700, cursor: "pointer",
            boxShadow: "0 4px 12px rgba(0,0,0,0.15)",
          }}>
            Explore This Opportunity →
          </button>
          {userTier === "anonymous" && (
            <p style={{ margin: "12px 0 0", fontSize: 12, color: "rgba(255,255,255,0.6)" }}>Free account required to explore</p>
          )}
        </div>

        {/* Footer */}
        <div style={{ textAlign: "center", padding: "32px 0", fontSize: 12, color: C.gray400 }}>
          Powered by OnFrontiers · 17,000+ federal SMEs · Data from GovTribe
        </div>
      </div>
    </div>
  );
}

function ResultsPage({ query, isOpportunity, onBack, onViewProfile, onSignup, userTier = "anonymous", shortlist = [], onToggleShortlist = null, isInShortlist = null, onToggleShortlistPanel = null, onOpenShareModal = null }) {
  const [showEnrichment, setShowEnrichment] = useState(true);
  const [unblurAnimating, setUnblurAnimating] = useState(false);
  const prevTierRef = useRef(userTier);
  const opp = ENRICHED_OPP;
  const isFreeAccount = userTier === "free-account";

  // Trigger unblur animation when tier upgrades to free-account
  useEffect(() => {
    if (userTier === "free-account" && prevTierRef.current !== "free-account") {
      setUnblurAnimating(true);
      const timer = setTimeout(() => setUnblurAnimating(false), 1200);
      return () => clearTimeout(timer);
    }
    prevTierRef.current = userTier;
  }, [userTier]);

  return (
    <div style={{ minHeight: "100vh", background: C.gray50, fontFamily: '-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif' }}>
      {/* Unblur animation keyframes */}
      {unblurAnimating && (
        <style>{`
          @keyframes unblurReveal {
            0% { filter: blur(4px); opacity: 0.5; }
            60% { filter: blur(1px); opacity: 0.85; }
            100% { filter: blur(0px); opacity: 1; }
          }
          .unblur-animate {
            animation: unblurReveal 0.8s ease-out forwards;
          }
        `}</style>
      )}

      {/* Nav — tier-aware */}
      <nav style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "12px 32px", background: C.white, borderBottom: `1px solid ${C.gray200}` }}>

        <div style={{ flex: 1, maxWidth: 480, margin: "0 24px" }}>

            <div style={{ display: "flex", flexDirection: "column", gap: 12 }} className={unblurAnimating ? "unblur-animate" : ""}>

  const [selectedExpertRank, setSelectedExpertRank] = useState(1);
  const [showSignupModal, setShowSignupModal] = useState(false);
  const [signupExpertContext, setSignupExpertContext] = useState(null);
  const [searchCount, setSearchCount] = useState(0);
  const [capturedEmail, setCapturedEmail] = useState(null);
  // userTier: "anonymous" → "email-captured" → "free-account"
  const [userTier, setUserTier] = useState("anonymous");
  const [userInfo, setUserInfo] = useState({ email: null, firstName: null, lastName: null, company: null });

  // Shortlist state
  const [shortlist, setShortlist] = useState([]);
  const [showShortlistPanel, setShowShortlistPanel] = useState(false);
  const [showShareModal, setShowShareModal] = useState(false);

  // Opportunity state
  const [selectedOpportunity, setSelectedOpportunity] = useState(null);

  const detectOpportunity = (q) => {
    const lower = q.toLowerCase();
    return lower.includes("govtribe.com") || lower.includes("sam.gov") || /W\d{5,}/.test(q) || /\d{4,}-\d{2,}/.test(q) || lower.includes("solicitation") || lower.includes("caei") || lower.includes("navwar");
  };

  // First search is free; subsequent searches require email
  const isEmailGated = searchCount > 0 && !capturedEmail;

  const handleSearch = (q) => {
    setQuery(q);
    setIsOpportunity(detectOpportunity(q));
    setSearchCount(prev => prev + 1);
    setScreen("processing");
  };

  const handleViewOpportunity = (opp) => {
    setSelectedOpportunity(opp);
    setScreen("opportunity");
  };

  const handleExploreOpportunity = () => {
    if (selectedOpportunity) {
      setQuery(selectedOpportunity.title);
      setIsOpportunity(true);
      setSearchCount(prev => prev + 1);
      setScreen("processing");
    }
  };

  const handleEmailCaptured = (email) => {
    setCapturedEmail(email);
    setUserTier("email-captured");
    // Infer company from domain
    const domain = email.split("@")[1] || "";
    const isPersonal = ["gmail.com","yahoo.com","hotmail.com","outlook.com","aol.com","icloud.com"].includes(domain.toLowerCase());
    const company = isPersonal ? "" : domain.split(".")[0].charAt(0).toUpperCase() + domain.split(".")[0].slice(1);
    setUserInfo(prev => ({ ...prev, email, company }));
  };

  const handleFreeAccountCreated = (info) => {
    setUserTier("free-account");
    setUserInfo(prev => ({ ...prev, ...info }));
    setShowSignupModal(false);
  };

  const handleProcessingComplete = () => {
    setScreen("results");
  };

  const handleViewProfile = (expert) => {
    setSelectedExpert(expert);
    setSelectedExpertRank(EXPERTS.findIndex(e => e.id === expert.id) + 1);
    setScreen("profile");
  };

  const handleSignup = () => {
    setShowSignupModal(false);
    // In a real app, this would authenticate and unlock content
  };

  const handleToggleShortlist = (expert) => {
    setShortlist((prev) => {
      const exists = prev.find((e) => e.id === expert.id);
      if (exists) {
        return prev.filter((e) => e.id !== expert.id);
      }
      return [...prev, expert];
    });
  };

  const handleRemoveFromShortlist = (expertId) => {
    setShortlist((prev) => prev.filter((e) => e.id !== expertId));
  };

  const isInShortlist = (expertId) => shortlist.some((e) => e.id === expertId);

  if (screen === "processing") {
    return (
      <QueryProcessingScreen
        query={query}
        isOpportunity={isOpportunity}
        onComplete={handleProcessingComplete}
        requiresEmail={isEmailGated}
        onEmailCaptured={handleEmailCaptured}
        searchCount={searchCount}
      />
    );
  }

  if (screen === "shared-shortlist") {
    return (
      <SharedShortlistPage
        shortlist={shortlist}
        opportunityTitle={isOpportunity ? "CAEI — NAVWAR" : null}
        query={query}
        onBack={() => setScreen("home")}
        sharedByName="Patricia"
        sharedByCompany="Acme Corp"
      />
    );
  }

  if (screen === "opportunity" && selectedOpportunity) {
    return (
      <OpportunityLandingPage
        opportunity={selectedOpportunity}
        onBack={() => { setSelectedOpportunity(null); setScreen("home"); }}
        onExplore={handleExploreOpportunity}
        onSignup={() => setShowSignupModal(true)}
        userTier={userTier}
      />
    );
  }

  if (screen === "profile" && selectedExpert) {
    return (
      <ExpertProfilePage
        expert={selectedExpert}
        onBack={() => setScreen("results")}
        onSignup={handleSignup}
        onCreateAccount={handleFreeAccountCreated}
        resultPosition={selectedExpertRank}
        totalResults={EXPERTS.length}
        userTier={userTier}
        userInfo={userInfo}
        query={query}
        isOpportunity={isOpportunity}
        onNavigateExpert={(direction) => {
          const currentIdx = EXPERTS.findIndex(e => e.id === selectedExpert.id);
          const nextIdx = direction === "next" ? currentIdx + 1 : currentIdx - 1;
          if (nextIdx >= 0 && nextIdx < EXPERTS.length) {
            setSelectedExpert(EXPERTS[nextIdx]);
            setSelectedExpertRank(nextIdx + 1);
          }
        }}
        isShortlisted={isInShortlist(selectedExpert.id)}
        onToggleShortlist={handleToggleShortlist}
      />
    );
  }

  if (screen === "results") {
    return (
      <>
        {showSignupModal && <SignupModal onClose={() => { setShowSignupModal(false); setSignupExpertContext(null); }} onSignup={handleSignup} onCreateAccount={handleFreeAccountCreated} expertContext={signupExpertContext} userTier={userTier} userInfo={userInfo} />}
        {showShareModal && <ShareShortlistModal onClose={() => setShowShareModal(false)} shortlist={shortlist} opportunityTitle={isOpportunity ? "CAEI — NAVWAR" : null} query={query} userTier={userTier} />}
        <ShortlistPanel
          shortlist={shortlist}
          isOpen={showShortlistPanel}
          onClose={() => setShowShortlistPanel(false)}
          onRemove={handleRemoveFromShortlist}
          onViewProfile={handleViewProfile}
          userTier={userTier}
          opportunityTitle={isOpportunity ? "CAEI — NAVWAR" : null}
          query={query}
          onOpenShareModal={() => setShowShareModal(true)}
        />
        <ResultsPage
          query={query}
          isOpportunity={isOpportunity}
          onBack={() => setScreen("home")}
          onViewProfile={handleViewProfile}
          onSignup={(expertOrNull) => { setSignupExpertContext(expertOrNull || null); setShowSignupModal(true); }}
          userTier={userTier}
          shortlist={shortlist}
          onToggleShortlist={handleToggleShortlist}
          isInShortlist={isInShortlist}
          onToggleShortlistPanel={() => setShowShortlistPanel(!showShortlistPanel)}
          onOpenShareModal={() => setShowShareModal(true)}
        />
      </>
    );
  }

  return <Homepage onSearch={handleSearch} onViewSharedShortlist={() => setScreen("shared-shortlist")} onViewOpportunity={handleViewOpportunity} />;
}


ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
